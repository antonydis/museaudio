io de que los atributos de un retrato a veces dicen más de sus restauradores que de su protagonista."}},{"id":"cupid-psyche","meta":{"fr":{"t":"Cupidon et Psyché","m":"2e moitié du 2e s. · Peut-être trouvé près de Castra Praetoria"},"en":{"t":"Cupid and Psyche","m":"2nd half of 2nd c. · Possibly found near Castra Praetoria"},"es":{"t":"Cupido y Psique","m":"2.ª mitad del s. II · Posiblemente hallado cerca de Castra Praetoria"}},"txt":{"fr":"Deux adolescents s'enlacent tendrement : Cupidon, dieu de l'amour, et Psyché, personnification de l'âme humaine. Leur légende, racontée par l'écrivain Apulée, est un conte d'amour interdit, d'épreuves imposées par la jalousie de Vénus, et finalement récompensé par l'immortalité — une histoire si aimée qu'elle a inspiré d'innombrables copies jusqu'à l'époque moderne. Regardez les teintes de marbre : le corps ancien, en marbre grec, contraste avec les parties restaurées en marbre blanc et en pavonazzetto veiné, signe visible que cette œuvre a traversé les siècles par étapes, chacune laissant sa trace.","en":"Two adolescents share a tender embrace: Cupid, god of love, and Psyche, the personification of the human soul. Their story, told by the writer Apuleius, is a tale of forbidden love, trials imposed by Venus's jealousy, and a reward of immortality at the end — so beloved a story it inspired countless copies well into the modern era. Look closely at the marble tones: the ancient Greek-marble body contrasts with sections restored in white marble and veined pavonazzetto, a visible sign that this work crossed the centuries in stages, each one leaving its mark.","es":"Dos adolescentes se abrazan con ternura: Cupido, dios del amor, y Psique, personificación del alma humana. Su leyenda, narrada por el escritor Apuleyo, es un relato de amor prohibido, de pruebas impuestas por los celos de Venus, y finalmente recompensado con la inmortalidad: una historia tan querida que inspiró innumerables copias hasta la época moderna. Fíjese en los tonos del mármol: el cuerpo antiguo, en mármol griego, contrasta con las partes restauradas en mármol blanco y pavonazzetto veteado, señal visible de que esta obra atravesó los siglos por etapas, cada una dejando su huella."}},{"id":"boy-as-harpocrates","meta":{"fr":{"t":"Jeune garçon, restauré en Harpocrate","m":"1er-2e s. · Collection Giustiniani"},"en":{"t":"Boy, Restored as Harpocrates","m":"1st–2nd c. · Giustiniani Collection"},"es":{"t":"Niño, restaurado como Harpócrates","m":"s. I-II · Colección Giustiniani"}},"txt":{"fr":"Harpocrate descend du dieu égyptien Horus enfant, mais les Romains ont réinterprété son geste — un doigt porté aux lèvres — comme un signe universel de silence et de secret. Cette statue raconte une double transformation : au départ, le torse ancien représentait simplement un jeune garçon ; au 17e siècle, un restaurateur l'a réinventé en Harpocrate en ajoutant une coiffe égyptisante et une tête de fillette totalement étrangère au corps d'origine. Le résultat assume pleinement son hybridité, typique du goût baroque pour les figures composites et exotiques.","en":"Harpocrates descends from the Egyptian child-god Horus, but the Romans reinterpreted his gesture — a finger raised to the lips — as a universal sign of silence and secrecy. This statue tells a double transformation: originally, the ancient torso simply depicted a young boy; in the 17th century, a restorer reinvented it as Harpocrates by adding an Egyptian-style headdress and the head of a young girl entirely unrelated to the original body. The result fully embraces its own hybridity, typical of the Baroque taste for composite, exotic figures.","es":"Harpócrates desciende del dios egipcio Horus niño, pero los romanos reinterpretaron su gesto —un dedo llevado a los labios— como una señal universal de silencio y secreto. Esta estatua cuenta una doble transformación: en origen, el torso antiguo representaba simplemente a un niño; en el siglo XVII, un restaurador lo reinventó como Harpócrates añadiendo un tocado de estilo egipcio y una cabeza de niña completamente ajena al cuerpo original. El resultado asume por completo su propia hibridez, típica del gusto barroco por las figuras compuestas y exóticas."}},{"id":"old-man-otricoli","meta":{"fr":{"t":"Le vieil homme d'Otricoli","m":"Milieu du 1er s. av. n. è. · Peut-être trouvé à Otricoli"},"en":{"t":"The Old Man of Otricoli","m":"Mid-1st c. BCE · Possibly found in Otricoli"},"es":{"t":"El viejo de Otricoli","m":"Mediados del s. I a.e.c. · Posiblemente hallado en Otricoli"}},"txt":{"fr":"Rides profondes, joues creusées, peau relâchée : rien n'est adouci ici. Ce portrait est l'un des exemples les plus célèbres du vérisme romain, ce style qui, à la fin de la République, choisissait délibérément de vieillir ses sujets plutôt que de les idéaliser. Chaque marque du temps devenait une preuve d'expérience, de sagesse, d'autorité méritée — l'exact inverse des futurs portraits impériaux qui figeront leurs sujets dans une jeunesse éternelle. Reproduit dans d'innombrables manuels d'histoire de l'art, ce visage est devenu, avec la jeune fille de Vulci, l'un des deux visages emblèmes de toute la collection Torlonia.","en":"Deep wrinkles, hollow cheeks, sagging skin: nothing here is softened. This portrait is one of the most famous examples of Roman verism, a style that, in the late Republic, deliberately aged its subjects rather than idealizing them. Every mark of time became proof of experience, wisdom, hard-earned authority — the exact opposite of the later imperial portraits that would freeze their subjects in eternal youth. Reproduced in countless art history textbooks, this face has become, alongside the Maiden of Vulci, one of the two emblematic faces of the entire Torlonia Collection.","es":"Arrugas profundas, mejillas hundidas, piel caída: aquí nada se suaviza. Este retrato es uno de los ejemplos más célebres del verismo romano, un estilo que, a fines de la República, elegía deliberadamente envejecer a sus modelos en vez de idealizarlos. Cada marca del tiempo se convertía en prueba de experiencia, sabiduría y autoridad merecida: justo lo contrario de los futuros retratos imperiales, que congelarían a sus modelos en una juventud eterna. Reproducido en incontables manuales de historia del arte, este rostro se ha convertido, junto con la joven de Vulci, en uno de los dos rostros emblema de toda la colección Torlonia."}},{"id":"artemis-ephesia","meta":{"fr":{"t":"Artémis d'Éphèse","m":"2e s. · Collection Giustiniani"},"en":{"t":"Artemis Ephesia","m":"2nd c. · Giustiniani Collection"},"es":{"t":"Ártemis de Éfeso","m":"s. II · Colección Giustiniani"}},"txt":{"fr":"Impossible de confondre cette Artémis avec une autre déesse : son corps est entièrement recouvert de rangées d'animaux, de signes zodiacaux et de formes globulaires souvent interprétées comme des symboles de protection universelle. Ce type dérive d'une statue de culte extrêmement ancienne conservée dans le sanctuaire d'Artémis à Éphèse, en Asie Mineure, l'une des sept merveilles du monde antique. Contrairement au marbre blanc du corps, la tête, le cou et les mains sont taillés dans un marbre noir : un choix rare qui accentuait sans doute, dans la pénombre d'un temple, l'aura mystérieuse de la déesse.","en":"There's no mistaking this Artemis for any other goddess: her body is entirely covered in rows of animals, zodiac signs, and rounded forms often read as universal symbols of protection. The type derives from an extremely ancient cult statue housed in the sanctuary of Artemis at Ephesus, in Asia Minor — one of the Seven Wonders of the ancient world. Unlike the white marble of the body, the head, neck, and hands are carved from black marble: a rare choice that, in the dim light of a temple, would have deepened the goddess's mysterious aura.","es":"Es imposible confundir a esta Ártemis con otra diosa: su cuerpo está enteramente cubierto de hileras de animales, signos zodiacales y formas globulares a menudo interpretadas como símbolos de protección universal. Este tipo deriva de una estatua de culto extremadamente antigua conservada en el santuario de Ártemis en Éfeso, en Asia Menor, una de las siete maravillas del mundo antiguo. A diferencia del mármol blanco del cuerpo, la cabeza, el cuello y las manos están tallados en mármol negro: una elección poco frecuente que, en la penumbra de un templo, sin duda acentuaba el aura misteriosa de la diosa."}},{"id":"odysseus-ram","meta":{"fr":{"t":"Ulysse sous le bélier","m":"Fin du 1er s. · Villa Albani"},"en":{"t":"Odysseus Beneath the Ram","m":"Late 1st c. · Villa Albani"},"es":{"t":"Odiseo bajo el carnero","m":"Fines del s. I · Villa Albani"}},"txt":{"fr":"Un épisode précis de l'Odyssée d'Homère : prisonnier dans la grotte du cyclope Polyphème, Ulysse échappe au monstre aveuglé en s'attachant sous le ventre d'un bélier, confondu avec la laine de l'animal. Ce groupe capture l'instant de la ruse plutôt que celui de l'action héroïque — l'intelligence plutôt que la force brute, une valeur profondément grecque que les Romains ont adoptée avec enthousiasme dans leur propre panthéon de héros littéraires.","en":"A precise episode from Homer's Odyssey: trapped in the cave of the Cyclops Polyphemus, Odysseus escapes the blinded monster by lashing himself beneath the belly of a ram, mistaken for the animal's fleece. This group captures the moment of cunning rather than heroic action — intelligence over brute strength, a deeply Greek value that the Romans enthusiastically adopted into their own pantheon of literary heroes.","es":"Un episodio muy preciso de la Odisea de Homero: atrapado en la cueva del cíclope Polifemo, Odiseo escapa del monstruo cegado atándose bajo el vientre de un carnero, confundido con la lana del animal. Este grupo capta el instante de la astucia y no el de la acción heroica: la inteligencia por encima de la fuerza bruta, un valor profundamente griego que los romanos adoptaron con entusiasmo en su propio panteón de héroes literarios."}},{"id":"isis-as-ceres","meta":{"fr":{"t":"Isis, restaurée en Cérès","m":"2e-début du 3e s. · Collection Giustiniani"},"en":{"t":"Isis, Restored as Ceres","m":"2nd–early 3rd c. · Giustiniani Collection"},"es":{"t":"Isis, restaurada como Ceres","m":"s. II-inicios s. III · Colección Giustiniani"}},"txt":{"fr":"Cette statue a changé d'identité divine au fil du temps. Sculptée à l'origine pour représenter Isis, déesse égyptienne associée à la protection et à la maternité, elle a été transformée par des restaurateurs modernes, qui lui ont ajouté une main tenant des épis de blé : la voici devenue Cérès, déesse romaine de l'agriculture. Ce genre de glissement était courant, car de nombreuses divinités égyptiennes et romaines partageaient des attributs suffisamment proches pour permettre ce genre de réinvention — un rappel que l'identité d'une statue n'est jamais totalement figée.","en":"This statue has changed divine identity over time. Originally carved to represent Isis, the Egyptian goddess linked to protection and motherhood, it was transformed by modern restorers, who added a hand holding wheat sheaves: here she is, now Ceres, the Roman goddess of agriculture. This kind of shift was common, since many Egyptian and Roman deities shared attributes close enough to make this sort of reinvention possible — a reminder that a statue's identity is never entirely fixed.","es":"Esta estatua ha cambiado de identidad divina con el tiempo. Esculpida en origen para representar a Isis, diosa egipcia asociada con la protección y la maternidad, fue transformada por restauradores modernos, que le añadieron una mano sosteniendo espigas de trigo: aquí la tiene, convertida ahora en Ceres, diosa romana de la agricultura. Este tipo de cambio era habitual, ya que muchas divinidades egipcias y romanas compartían atributos lo bastante parecidos como para permitir esta clase de reinvención: un recordatorio de que la identidad de una estatua nunca queda del todo fija."}},{"id":"portus-relief","meta":{"fr":{"t":"Le relief de Portus","m":"Fin du 2e-début du 3e s. · Fouilles Torlonia de 1864 à Portus"},"en":{"t":"The Portus Relief","m":"Late 2nd–early 3rd c. · 1864 Torlonia excavation at Portus"},"es":{"t":"El relieve de Portus","m":"Fines s. II-inicios s. III · Excavación Torlonia de 1864 en Portus"}},"txt":{"fr":"C'est l'un des fragments antiques les plus étudiés au monde. Ce relief représente Portus, le port impérial de Rome, actif pendant plus de quatre siècles : bâtiments réels, activité commerciale animée, et de grands yeux apotropaïques censés éloigner le mauvais sort, comme on en peignait encore sur les bateaux de pêche méditerranéens il y a peu. Regardez la surface de très près : des traces de peinture originale — rouge, jaune, vert, bleu — ont survécu, un témoignage rarissime de la Rome antique en couleur, quand la plupart des marbres qui nous entourent aujourd'hui nous parviennent d'une blancheur trompeuse.","en":"This is one of the most studied ancient fragments in the world. The relief depicts Portus, imperial Rome's harbour, active for more than four centuries: real buildings, bustling commercial activity, and large apotropaic eyes meant to ward off bad luck, much like the eyes still painted on Mediterranean fishing boats not so long ago. Look closely at the surface: traces of original paint — red, yellow, green, blue — have survived, an exceedingly rare glimpse of ancient Rome in colour, when most of the marble around us today reaches us deceptively white.","es":"Este es uno de los fragmentos antiguos más estudiados del mundo. El relieve representa Portus, el puerto imperial de Roma, activo durante más de cuatro siglos: edificios reales, bulliciosa actividad comercial y grandes ojos apotropaicos destinados a ahuyentar la mala suerte, muy parecidos a los que aún se pintaban en barcas de pesca mediterráneas hasta hace poco. Mire de cerca la superficie: han sobrevivido trazas de pintura original —rojo, amarillo, verde, azul—, un testimonio rarísimo de la Roma antigua en color, cuando la mayoría de los mármoles que nos rodean hoy nos llegan con una blancura engañosa."}},{"id":"mithraic-relief","meta":{"fr":{"t":"Relief du sacrifice mithriaque","m":"2e s. · Colline du Quirinal, Rome"},"en":{"t":"Relief of the Mithraic Sacrifice","m":"2nd c. · Quirinal Hill, Rome"},"es":{"t":"Relieve del sacrificio mitraico","m":"s. II · Colina del Quirinal, Roma"}},"txt":{"fr":"Mithra, dieu venu de Perse, plante son poignard dans le flanc d'un taureau : l'image centrale d'un culte à mystères extrêmement populaire parmi les soldats romains, en particulier aux frontières de l'Empire. Devenir initié impliquait de gravir sept grades secrets — corbeau, jeune marié, soldat, lion, perse, messager du soleil, père — chacun associé à une planète et à des rituels que peu de sources antiques décrivent, car le silence faisait partie du serment. Les cérémonies se tenaient dans des sanctuaires souterrains volontairement aménagés comme des grottes, loin du regard du reste de la cité.","en":"Mithras, a god of Persian origin, plunges his dagger into a bull's side: the central image of an extremely popular mystery cult among Roman soldiers, especially along the Empire's frontiers. Becoming an initiate meant climbing through seven secret grades — Raven, Bridegroom, Soldier, Lion, Persian, Sun-Runner, Father — each tied to a planet and to rituals that few ancient sources describe, since silence was part of the oath. Ceremonies took place in underground sanctuaries deliberately built to resemble caves, hidden from the rest of the city.","es":"Mitra, dios de origen persa, clava su puñal en el costado de un toro: la imagen central de un culto de misterios extremadamente popular entre los soldados romanos, sobre todo en las fronteras del Imperio. Convertirse en iniciado implicaba ascender por siete grados secretos —cuervo, novio, soldado, león, persa, mensajero del sol, padre—, cada uno vinculado a un planeta y a rituales que pocas fuentes antiguas describen, ya que el silencio formaba parte del juramento. Las ceremonias se celebraban en santuarios subterráneos construidos deliberadamente para parecer cuevas, ocultos de la mirada del resto de la ciudad."}},{"id":"mercury-herm","meta":{"fr":{"t":"Mercure en forme de terme","m":"2e s. · Fouilles à Curi, l'antique Cures"},"en":{"t":"Mercury in the Form of a Herm","m":"2nd c. · Excavated at Curi, ancient Cures"},"es":{"t":"Mercurio en forma de herma","m":"s. II · Excavado en Curi, la antigua Cures"}},"txt":{"fr":"Une tête posée sur un pilier nu et rectangulaire : c'est un terme, une forme de sculpture héritée de la Grèce ancienne, où l'on plaçait ces bornes aux carrefours et aux limites des cités pour éloigner le danger. Mercure, dieu du commerce, des routes et des voyageurs, y trouvait un support particulièrement logique — qui de mieux qu'un dieu voyageur pour veiller sur ceux qui empruntaient ces mêmes chemins ? Ce terme précis fut retrouvé dans le domaine de Cures, en Sabine, la même région où fut découvert le bronze de Germanicus que vous avez peut-être déjà vu.","en":"A head resting on a plain rectangular pillar: this is a herm, a sculptural form inherited from ancient Greece, where such markers were set up at crossroads and city boundaries to ward off danger. Mercury, god of commerce, roads, and travellers, was a particularly logical fit for this form — who better than a travelling god to watch over those using the same roads? This particular herm was found on the estate of Cures, in the Sabine hills, the same region where the bronze Germanicus you may have already seen was discovered.","es":"Una cabeza apoyada sobre un pilar liso y rectangular: es una herma, una forma escultórica heredada de la antigua Grecia, donde este tipo de marcadores se colocaban en cruces de caminos y límites de ciudades para alejar el peligro. Mercurio, dios del comercio, los caminos y los viajeros, encajaba de forma especialmente lógica en este soporte: ¿quién mejor que un dios viajero para velar por quienes recorrían esos mismos caminos? Esta herma en concreto se halló en la finca de Cures, en la Sabina, la misma región donde se descubrió el bronce de Germánico que quizás ya vio."}},{"id":"isis-statue","meta":{"fr":{"t":"Statue d'Isis","m":"2e s. · Peut-être collection Giustiniani"},"en":{"t":"Statue of Isis","m":"2nd c. · Possibly Giustiniani Collection"},"es":{"t":"Estatua de Isis","m":"s. II · Posiblemente colección Giustiniani"}},"txt":{"fr":"Après la chute de Cléopâtre et l'annexion de l'Égypte par Rome en 30 avant notre ère, le culte d'Isis s'est répandu dans toute l'Italie avec une ferveur inattendue pour une divinité étrangère. Seul le torse de cette statue est antique : le nœud caractéristique du vêtement sur la poitrine identifie la déesse sans ambiguïté, tandis que ses attributs restaurés — le sistre, une sorte de hochet sacré, et la situle, un petit seau rituel — complètent une iconographie que même un Romain non initié aurait su reconnaître au premier coup d'œil.","en":"After Cleopatra's fall and Rome's annexation of Egypt in 30 BCE, the cult of Isis spread across Italy with a fervour unusual for a foreign deity. Only the torso of this statue is ancient: the distinctive knotted garment across her chest identifies the goddess unmistakably, while her restored attributes — the sistrum, a kind of sacred rattle, and the situla, a small ritual bucket — complete an iconography even an uninitiated Roman would have recognized at a glance.","es":"Tras la caída de Cleopatra y la anexión de Egipto por Roma en el año 30 a.e.c., el culto a Isis se extendió por toda Italia con un fervor inusual para una divinidad extranjera. Solo el torso de esta estatua es antiguo: el característico nudo de la prenda sobre el pecho identifica a la diosa sin ambigüedad, mientras que sus atributos restaurados —el sistro, una especie de sonajero sagrado, y la situla, un pequeño cubo ritual— completan una iconografía que hasta un romano no iniciado habría reconocido de un vistazo."}},{"id":"hestia-giustiniani","meta":{"fr":{"t":"Déesse dite Hestia Giustiniani","m":"1re moitié du 2e s. · Marbre de Paros · Collection Giustiniani"},"en":{"t":"Goddess Known as the Hestia Giustiniani","m":"First half of 2nd c. · Parian marble · Giustiniani Collection"},"es":{"t":"Diosa llamada Hestia Giustiniani","m":"1.ª mitad del s. II · Mármol de Paros · Colección Giustiniani"}},"txt":{"fr":"Voici, dit-on, la seule réplique romaine complète connue à ce jour d'un bronze grec original du cinquième siècle avant notre ère. Son drapé raide, sa pose frontale et solennelle imitent délibérément le style dit Sévère, en vogue en Grèce autour de 470 avant notre ère — c'est-à-dire que même pour les Romains d'Hadrien qui ont commandé cette copie, ce style paraissait déjà ancien et empreint d'une austérité noble. Reproduire un archaïsme volontaire, deux siècles et demi après sa création : une forme de nostalgie esthétique que même l'Antiquité pratiquait.","en":"This is said to be the only complete Roman replica known today of an original Greek bronze from the fifth century BCE. Her stiff drapery and solemn frontal pose deliberately imitate the so-called Severe Style, fashionable in Greece around 470 BCE — meaning that even to the Hadrianic Romans who commissioned this copy, the style already looked ancient, carrying a noble austerity. Deliberately reviving an archaism two and a half centuries after it was created: a form of aesthetic nostalgia that even antiquity itself indulged in.","es":"Esta es, según se dice, la única réplica romana completa conocida hasta hoy de un bronce griego original del siglo V a.e.c. Su drapeado rígido y su pose frontal y solemne imitan deliberadamente el llamado estilo Severo, en boga en Grecia hacia el año 470 a.e.c. — es decir, que incluso para los romanos de época adrianea que encargaron esta copia, el estilo ya resultaba antiguo, cargado de una austeridad noble. Revivir a propósito un arcaísmo dos siglos y medio después de su creación: una forma de nostalgia estética que hasta la Antigüedad practicaba."}},{"id":"head-of-mars","meta":{"fr":{"t":"Tête de Mars","m":"1re moitié du 2e s. · Collection Giustiniani"},"en":{"t":"Head of Mars","m":"First half of 2nd c. · Giustiniani Collection"},"es":{"t":"Cabeza de Marte","m":"1.ª mitad del s. II · Colección Giustiniani"}},"txt":{"fr":"Mars, dieu de la guerre, occupait une place à part dans l'imaginaire romain : contrairement à son équivalent grec Arès, souvent traité avec ambivalence, Mars était vénéré comme le père mythique de Rome elle-même, à travers Romulus et Rémus. Cette tête appartient à un type sculptural précis, documenté sur plusieurs exemplaires connus dans les collections européennes, preuve qu'un modèle particulièrement réussi pouvait être copié encore et encore à travers l'Empire, chaque atelier y ajoutant ses propres nuances.","en":"Mars, god of war, held a special place in the Roman imagination: unlike his Greek counterpart Ares, often treated with ambivalence, Mars was revered as the mythical father of Rome itself, through Romulus and Remus. This head belongs to a specific sculptural type documented across several known examples in European collections — proof that a particularly successful model could be copied again and again throughout the Empire, each workshop adding its own subtle variations.","es":"Marte, dios de la guerra, ocupaba un lugar aparte en el imaginario romano: a diferencia de su equivalente griego Ares, tratado a menudo con ambivalencia, Marte era venerado como el padre mítico de la propia Roma, a través de Rómulo y Remo. Esta cabeza pertenece a un tipo escultórico preciso, documentado en varios ejemplares conocidos en colecciones europeas, prueba de que un modelo especialmente logrado podía copiarse una y otra vez por todo el Imperio, cada taller añadiendo sus propios matices."}},{"id":"athena-statue","meta":{"fr":{"t":"Athéna","m":"Fin 1er s. av. n. è.-début 1er s. · Collection Giustiniani"},"en":{"t":"Athena","m":"Late 1st c. BCE–early 1st c. · Giustiniani Collection"},"es":{"t":"Atenea","m":"Fines s. I a.e.c.-inicios s. I · Colección Giustiniani"}},"txt":{"fr":"Cette Athéna casquée porte en réalité sa troisième tête. La première a disparu depuis longtemps ; la deuxième, coiffée d'un simple casque, n'est connue que par des dessins d'archives ; la troisième, celle que vous voyez, a été ajoutée après l'entrée de la statue dans la collection Torlonia — probablement en même temps que le petit hibou posé sur son bras gauche. Ce choix n'est pas anodin : le hibou est à la fois l'attribut traditionnel d'Athéna, déesse tutélaire d'Athènes, et l'emblème personnel de la famille Torlonia elle-même. Une seule sculpture, deux blasons superposés, à seize siècles d'écart.","en":"This helmeted Athena is actually on her third head. The first vanished long ago; the second, wearing a simple helmet, is known only from archival drawings; the third, the one you see now, was added after the statue entered the Torlonia Collection — likely at the same time as the small owl now resting on her left arm. That choice wasn't casual: the owl is both Athena's traditional attribute, as patron goddess of Athens, and the Torlonia family's own personal emblem. One sculpture, two coats of arms layered on top of each other, sixteen centuries apart.","es":"Esta Atenea con casco está, de hecho, en su tercera cabeza. La primera desapareció hace mucho; la segunda, con un simple casco, solo se conoce por dibujos de archivo; la tercera, la que ve ahora, se añadió después de que la estatua entrara en la colección Torlonia, probablemente al mismo tiempo que el pequeño búho que descansa en su brazo izquierdo. Esa elección no fue casual: el búho es a la vez el atributo tradicional de Atenea, diosa patrona de Atenas, y el emblema personal de la propia familia Torlonia. Una sola escultura, dos blasones superpuestos, con dieciséis siglos de diferencia."}},{"id":"artemis-huntress","meta":{"fr":{"t":"Artémis chasseresse","m":"2e moitié du 2e s. · Collection Giustiniani"},"en":{"t":"Artemis the Huntress","m":"2nd half of 2nd c. · Giustiniani Collection"},"es":{"t":"Ártemis cazadora","m":"2.ª mitad del s. II · Colección Giustiniani"}},"txt":{"fr":"Une autre Artémis vous attend ici, radicalement différente de celle d'Éphèse croisée plus tôt dans le parcours : déesse de la chasse, des espaces sauvages et de la lune, montrée avec son arc et accompagnée d'un chien de chasse. Là où l'Artémis d'Éphèse incarnait une puissance protectrice presque cosmique, celle-ci exprime une indépendance farouche, ancrée dans la nature et le mouvement — deux facettes bien distinctes d'une même déesse, que les Romains n'ont jamais cherché à réduire à une seule image.","en":"Another Artemis awaits here, radically different from the Ephesian one you may have met earlier in the tour: goddess of the hunt, wild places, and the moon, shown here with her bow and a hunting dog at her side. Where the Ephesian Artemis embodied an almost cosmic protective power, this one expresses a fierce independence, rooted in nature and motion — two quite distinct facets of the same goddess, which the Romans never tried to flatten into a single image.","es":"Aquí le espera otra Ártemis, radicalmente distinta de la de Éfeso que quizás vio antes en el recorrido: diosa de la caza, los espacios salvajes y la luna, representada aquí con su arco y un perro de caza a su lado. Donde la Ártemis de Éfeso encarnaba un poder protector casi cósmico, esta expresa una independencia feroz, anclada en la naturaleza y el movimiento: dos facetas bien distintas de una misma diosa, que los romanos nunca intentaron reducir a una sola imagen."}},{"id":"hercules-statue","meta":{"fr":{"t":"Hercule","m":"Fin du 2e s. · Acquisition Torlonia"},"en":{"t":"Hercules","m":"Late 2nd c. · Torlonia acquisition"},"es":{"t":"Hércules","m":"Fines del s. II · Adquisición Torlonia"}},"txt":{"fr":"Après l'avoir vu affronter ses douze travaux sur deux sarcophages différents, voici Hercule lui-même, massue à la main, drapé dans la peau du lion de Némée, premier de ses exploits légendaires. Pour les Romains, Hercule incarnait la virtus : le courage, l'endurance, la force mise au service d'un bien supérieur. Les empereurs eux-mêmes ont parfois emprunté son image pour se présenter en protecteurs héroïques de l'État — la musculature du héros devenant, par extension, une métaphore visuelle du pouvoir romain lui-même.","en":"Having already watched him battle through his twelve labours on two different sarcophagi, here is Hercules himself, club in hand, draped in the skin of the Nemean lion, the first of his legendary feats. For the Romans, Hercules embodied virtus: courage, endurance, strength placed in service of a greater good. Emperors themselves sometimes borrowed his image to present themselves as the state's heroic protectors — the hero's musculature becoming, by extension, a visual metaphor for Roman power itself.","es":"Después de verlo enfrentar sus doce trabajos en dos sarcófagos distintos, aquí está Hércules mismo, maza en mano, envuelto en la piel del león de Nemea, la primera de sus hazañas legendarias. Para los romanos, Hércules encarnaba la virtus: el valor, la resistencia, la fuerza puesta al servicio de un bien superior. Los propios emperadores tomaron a veces prestada su imagen para presentarse como protectores heroicos del Estado: la musculatura del héroe convertida, por extensión, en una metáfora visual del propio poder romano."}},{"id":"silenus-satyr","meta":{"fr":{"t":"Silène, le vieux satyre","m":"1er s. · Collection Giustiniani"},"en":{"t":"Silenus, the Old Satyr","m":"1st c. · Giustiniani Collection"},"es":{"t":"Sileno, el viejo sátiro","m":"s. I · Colección Giustiniani"}},"txt":{"fr":"Mi-homme, mi-bête, Silène est le plus âgé et le plus ivre des satyres, précepteur et compagnon fidèle du dieu Bacchus. Sa sagesse trouble, née du vin autant que d'une expérience millénaire, pouvait aussi bien égarer qu'éclairer ceux qui la sollicitaient. Ici, le vieux Silène soutient un enfant endormi dans ses bras : selon les lectures, tantôt un jeune Dionysos qu'il élève et protège, tantôt une réinterprétation postérieure du groupe. Un détail amusant : cette photo a été prise à l'envers, mais l'inscription du cartel reste parfaitement lisible — la statue, elle, tient parfaitement debout dans la galerie.","en":"Half man, half beast, Silenus is the oldest and drunkest of the satyrs, tutor and faithful companion to the god Bacchus. His hazy wisdom, born as much of wine as of ancient experience, could just as easily mislead as enlighten those who sought it out. Here, the old Silenus cradles a sleeping child in his arms: depending on the reading, either the young Dionysus he raises and protects, or a later reinterpretation of the group. A small aside: the reference photo for this label happened to be upside down — the statue itself, of course, stands perfectly upright in the gallery.","es":"Mitad hombre, mitad bestia, Sileno es el más viejo y el más ebrio de los sátiros, preceptor y fiel compañero del dios Baco. Su sabiduría confusa, nacida tanto del vino como de una experiencia milenaria, podía tanto confundir como iluminar a quien la buscaba. Aquí, el viejo Sileno sostiene en brazos a un niño dormido: según la lectura, unas veces el joven Dioniso al que cría y protege, otras una reinterpretación posterior del grupo. Un pequeño detalle curioso: la foto de referencia de este cartel estaba al revés, pero la estatua, por supuesto, se mantiene perfectamente en pie en la sala."}}],"horssocle":[{"id":"torsion","placeholder":true,"meta":{"fr":{"t":"Torsion","m":"Aluminium soudé · 1965"},"en":{"t":"Torsion","m":"Welded aluminium · 1965"},"es":{"t":"Torsión","m":"Aluminio soldado · 1965"}},"txt":{"fr":"Dans les années soixante, la sculpture descend de son piédestal et occupe le sol, comme vous et moi. Cette spirale d'aluminium soudé ne représente rien : elle est simplement là, matière et tension. Tournez autour, elle change à chaque pas. C'est vous, en marchant, qui complétez l'œuvre.","en":"In the sixties, sculpture stepped down from its pedestal and took to the floor, like you and me. This spiral of welded aluminium represents nothing: it is simply there, matter and tension. Walk around it, it changes with every step. It is you, walking, who completes the work.","es":"En los años sesenta, la escultura baja de su pedestal y ocupa el suelo, como usted y yo. Esta espiral de aluminio soldado no representa nada: simplemente está ahí, materia y tensión. Camine a su alrededor, cambia a cada paso. Es usted, caminando, quien completa la obra."}},{"id":"suspension","placeholder":true,"meta":{"fr":{"t":"Suspension I","m":"Fibres et acier · 1972"},"en":{"t":"Suspension I","m":"Fibre and steel · 1972"},"es":{"t":"Suspensión I","m":"Fibras y acero · 1972"}},"txt":{"fr":"Une sculpture peut-elle flotter ? Suspendue au plafond, cette masse de fibres tissées défie la première loi du genre : le poids. L'art textile, longtemps relégué à l'artisanat, revendique ici sa place dans la grande sculpture, souple là où le marbre est dur, aérien là où le bronze est lourd.","en":"Can a sculpture float? Hanging from the ceiling, this mass of woven fibre defies the genre's first law: weight. Textile art, long relegated to craft, here claims its place in grand sculpture, supple where marble is hard, airborne where bronze is heavy.","es":"¿Puede flotar una escultura? Suspendida del techo, esta masa de fibras tejidas desafía la primera ley del género: el peso. El arte textil, largamente relegado a la artesanía, reivindica aquí su lugar en la gran escultura, flexible donde el mármol es duro, aéreo donde el bronce es pesado."}},{"id":"champ","placeholder":true,"meta":{"fr":{"t":"Champ de plâtre","m":"Installation · 1981"},"en":{"t":"Plaster Field","m":"Installation · 1981"},"es":{"t":"Campo de yeso","m":"Instalación · 1981"}},"txt":{"fr":"Des dizaines de fragments de plâtre répandus au sol, comme les ruines d'un atelier. Est-ce une œuvre détruite ou une œuvre en train de naître ? L'installation ne se regarde pas : elle s'arpente. Chaque visiteur trace son propre chemin entre les fragments, et ce chemin fait partie de l'œuvre.","en":"Dozens of plaster fragments scattered across the floor, like the ruins of a studio. Is this a destroyed work or one being born? An installation is not looked at: it is walked through. Each visitor traces their own path between the fragments, and that path is part of the work.","es":"Decenas de fragmentos de yeso esparcidos por el suelo, como las ruinas de un taller. ¿Es una obra destruida o una obra naciendo? La instalación no se mira: se recorre. Cada visitante traza su propio camino entre los fragmentos, y ese camino es parte de la obra."}},{"id":"acier","placeholder":true,"meta":{"fr":{"t":"Sans titre (acier Corten)","m":"Acier Corten · 1968"},"en":{"t":"Untitled (Corten Steel)","m":"Corten steel · 1968"},"es":{"t":"Sin título (acero Corten)","m":"Acero Corten · 1968"}},"txt":{"fr":"Cet acier rouille volontairement. Le Corten, matériau industriel, développe une peau orangée qui le protège, et cette rouille est exactement ce que l'artiste voulait montrer : le temps qui travaille. Pas de titre, pas de socle, pas de récit. Juste trois plaques, un équilibre, et la couleur du temps.","en":"This steel rusts on purpose. Corten, an industrial material, develops an orange skin that protects it, and this rust is exactly what the artist wanted to show: time at work. No title, no pedestal, no story. Just three plates, a balance, and the colour of time.","es":"Este acero se oxida a propósito. El Corten, material industrial, desarrolla una piel anaranjada que lo protege, y ese óxido es exactamente lo que el artista quería mostrar: el tiempo trabajando. Sin título, sin pedestal, sin relato. Solo tres placas, un equilibrio y el color del tiempo."}},{"id":"atelier","placeholder":true,"meta":{"fr":{"t":"L'atelier renversé","m":"Techniques mixtes · 1994"},"en":{"t":"The Overturned Studio","m":"Mixed media · 1994"},"es":{"t":"El taller volcado","m":"Técnicas mixtas · 1994"}},"txt":{"fr":"Une table de travail fixée au mur, ses outils figés en pleine chute. L'artiste renverse littéralement son atelier pour nous montrer l'envers de la création : le désordre, l'accident, le geste interrompu. La sculpture contemporaine ne cache plus sa fabrication, elle en fait son sujet.","en":"A worktable fixed to the wall, its tools frozen mid-fall. The artist literally overturns the studio to show us the underside of creation: disorder, accident, the interrupted gesture. Contemporary sculpture no longer hides its making, it makes it the subject.","es":"Una mesa de trabajo fijada a la pared, sus herramientas congeladas en plena caída. El artista voltea literalmente su taller para mostrarnos el reverso de la creación: el desorden, el accidente, el gesto interrumpido. La escultura contemporánea ya no oculta su fabricación: la convierte en su tema."}},{"id":"monument","placeholder":true,"meta":{"fr":{"t":"Monument mou","m":"Textile et mousse · 2003"},"en":{"t":"Soft Monument","m":"Textile and foam · 2003"},"es":{"t":"Monumento blando","m":"Textil y espuma · 2003"}},"txt":{"fr":"Un monument qui s'affaisse doucement sous son propre poids. Tout ce qu'un monument doit être, dur, vertical, éternel, celui-ci le refuse avec humour. En textile et en mousse, il pose une question sérieuse sous des airs de peluche : et si nos monuments pouvaient être tendres ?","en":"A monument gently sagging under its own weight. Everything a monument must be, hard, vertical, eternal, this one refuses with humour. In textile and foam, it asks a serious question in the guise of a plush toy: what if our monuments could be tender?","es":"Un monumento que se hunde suavemente bajo su propio peso. Todo lo que un monumento debe ser, duro, vertical, eterno, este lo rechaza con humor. En textil y espuma, plantea una pregunta seria con aires de peluche: ¿y si nuestros monumentos pudieran ser tiernos?"}}]}};</script>

/* ---------- tema ---------- */
function setAccent(e){
  const r=document.documentElement.style;
  r.setProperty('--acc',e?e.accentUI:'#8a6428');
  r.setProperty('--glow',e?e.accent:'#c8964b');
}
/* ---------- vistas ---------- */
function show(v){['vHome','vMuseum','vExpo','vDone'].forEach(x=>$('#'+x).classList.toggle('on',x===v));window.scrollTo(0,0);}
function applyI18n(){
  document.documentElement.lang=lang;
  document.documentElement.dir=(LANGS.find(l=>l.code===lang)||{}).rtl?'rtl':'ltr';
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n));
  const sw=t('change')+' · '+lang.toUpperCase();
  ['langSwitch','langSwitch2','langSwitch3'].forEach(i=>$('#'+i).textContent=sw);
  $('#ttsNote').textContent=t('tts');
  $('#reorderHint').textContent=WORKS.length>1?t('reorder'):'';
  $('#footTxt').textContent=t('footTxt');
  $('#footLink').textContent=t('footLink');
  $('#tTitleTxt').textContent=t('transcript');
  if(!$('#dlBtn').classList.contains('done'))$('#dlSt').textContent=t('dl');
  $('#mailIn').placeholder=t('mailPh');
}

/* ---------- idioma ---------- */
function buildLangScreen(){
  const g=$('#langGrid');g.innerHTML='';
  const guess=(navigator.language||'fr').slice(0,2);
  const gu=UI[guess]||UI.fr;
  $('#langTitle').textContent=gu.langTitle;
  $('#langSub').textContent=gu.langSub;
  LANGS.forEach(l=>{
    const b=document.createElement('button');
    b.className='langBtn';
    b.textContent=l.native;
    b.onclick=()=>setLang(l.code);
    g.appendChild(b);
  });
}
function setLang(code){
  lang=code;localStorage.setItem('ma_lang',code);
  $('#vLang').classList.remove('on');
  applyI18n();renderHome();
  if(expoId){openExpo(expoId,false);}
  else if(museum){openMuseum(museum.id,false);}
  else{show('vHome');handleHash();}
}

/* ---------- museo ---------- */
function openMuseum(id,push){
  museum=DATA.museums.find(m=>m.id===id);
  if(!museum)return;
  if(push)history.replaceState(null,'','#m/'+id);
  $('#musEyebrow').textContent=museum.short;
  $('#musTitle').textContent=N(museum.name);
  $('#musCity').textContent=N(museum.city);
  const c=$('#expoCards');c.innerHTML='';
  museum.expos.forEach(eid=>{
    const e=DATA.expos[eid];
    const count=(DATA.works[eid]||[]).length;
    const card=document.createElement('button');
    card.className='expoCard';
    card.style.setProperty('--card-acc',e.accentUI);
    const badge=e.status==='closing'?`<span class="badge">${t('closing')}</span>`
      :(e.status==='soon'||count===0)?`<span class="badge">${t('soon')}</span>`:'';
    card.innerHTML=`${badge}
      <div class="eyebrow">${museum.short}</div>
      <h2>${N(e.title)}</h2>
      <div class="tag">${N(e.tag)}</div>
      <div class="foot">
        <span class="dates">${N(e.dates)}${(count&&e.status!=='soon')?` · ${count} ${t('works')}`:''}</span>
        <span class="chips">${e.langs.map(l=>`<span class="chip">${l}</span>`).join('')}</span>
      </div>`;
    card.onclick=()=>openExpo(eid,true);
    c.appendChild(card);
  });
  applyI18n();show('vMuseum');
}
$('#backHome').onclick=goHome;

/* ---------- exposición ---------- */
function openExpo(id,push){
  const e=DATA.expos[id];
  if(!e)return;
  expo=e;expoId=id;
  if(!museum)museum=DATA.museums.find(m=>m.expos.includes(id))||DATA.museums[0];
  setAccent(e);
  if(push)history.replaceState(null,'','#expo/'+id);
  const saved=JSON.parse(localStorage.getItem('ma_order_'+id)||'null');
  WORKS=orderWorks(DATA.works[id]||[],saved);
  if(e.status==='soon') WORKS=[]; // exposición aún no catalogada: ocultar placeholders, mostrar "en preparación"
  $('#backMusTxt').textContent=museum.short;
  $('#expoEyebrow').textContent=museum.short;
  $('#expoTitle').textContent=N(e.title);
  $('#expoSub').textContent=N(e.dates);
  // nota de idiomas disponibles / fallback
  const note=$('#langNote');
  if(!e.langs.includes(lang)&&WORKS.length){
    const fb=e.langs.includes('en')?'en':e.langs[0];
    note.innerHTML=t('fallbackNote')+' <b>'+fb.toUpperCase()+'</b> · '+t('audioIn')+' '+e.langs.map(x=>x.toUpperCase()).join(' · ');
  }else if(WORKS.length){
    note.innerHTML=t('audioIn')+' <b>'+e.langs.map(x=>x.toUpperCase()).join(' · ')+'</b>';
  }else note.innerHTML='';
  $('#expoActions').style.display=WORKS.length?'flex':'none';
  $('#dlBtn').classList.remove('done','busy');
  ambient.src=e.ambient||'';
  // progreso persistido de esta exposición (independiente de la sesión actual)
  played=new Set(JSON.parse(localStorage.getItem('ma_played_'+id)||'[]'));
  renderList();applyI18n();show('vExpo');syncAmbUI();renderProgress();
}
function realWorks(){ return WORKS.filter(w=>!w.intro); }
function realPlayedCount(){ return realWorks().filter(w=>played.has(w.id)).length; }
function renderProgress(){
  const box=$('#progressBox');
  const total=realWorks().length;
  if(!total){ box.classList.add('hidden'); return; }
  box.classList.remove('hidden');
  const n=realPlayedCount();
  const pct=total?n/total*100:0;
  $('#progressFill').style.width=pct+'%';
  $('#progressFill').classList.toggle('done',n>=total);
  $('#progressTxt').innerHTML=n>=total
    ? '✓ '+t('progressDone')
    : t('progress').replace('{n}','<b>'+n+'</b>').replace('{total}',total);
  $('#finishLink').textContent=t('finishVisit');
}
function markPlayed(w){
  if(w.intro)return;
  played.add(w.id);
  localStorage.setItem('ma_played_'+expoId, JSON.stringify([...played]));
  renderProgress();
  if(realPlayedCount()>=realWorks().length) pendingAutoDone=true;
}
$('#finishLink').onclick=()=>showDone();
function orderWorks(works,saved){
  if(!saved)return works.slice();
  const map=Object.fromEntries(works.map(w=>[w.id,w]));
  const out=saved.map(i=>map[i]).filter(Boolean);
  works.forEach(w=>{if(!saved.includes(w.id))out.push(w);});
  return out;
}
$('#backMus').onclick=()=>{expo=null;expoId=null;setAccent(null);openMuseum(museum.id,true);};

function numeral(i){
  const w=WORKS[i];
  if(w&&w.intro) return 'i'; // introducción: marcador propio, no consume número
  let n=0; for(let k=0;k<=i;k++){ if(!WORKS[k].intro) n++; } // cuenta solo obras reales
  return expo&&expo.numerals==='roman'?ROMAN[n-1]:String(n);
}
const workLang=w=>w.txt[lang]?lang:(w.txt.en?'en':Object.keys(w.txt)[0]); // fallback por obra
function audioUrl(w){
  const filename=`${w.id}_${workLang(w)}.mp3`;
  if(!AUDIO_BASE) return `audio/${filename}`; // local / GitHub Pages, ruta relativa
  const museumId=museum?museum.id:'mbam';
  return `${AUDIO_BASE}/${museumId}/${expoId}/${filename}`; // Cloudflare R2 u otro host externo
}
const wMeta=w=>w.meta[workLang(w)]||w.meta.fr;
const locOf=w=>w.loc?(typeof w.loc==='string'?w.loc:(w.loc[lang]||w.loc.en||w.loc.fr||'')):'';

function renderList(){
  const ol=$('#worksList');ol.innerHTML='';
  if(!WORKS.length){
    ol.innerHTML=`<div class="empty"><div class="serif">${t('preparing')}</div>${t('preparingSub')}</div>`;
    return;
  }
  WORKS.forEach((w,i)=>{
    const li=document.createElement('li');
    li.className='work';li.tabIndex=0;li.dataset.i=i;li.id='oeuvre-'+w.id;
    li.innerHTML=`
      <div class="medal s">${numeral(i)}</div>
      <div class="info">
        <h3>${wMeta(w).t}</h3>
        <div class="meta">${wMeta(w).m}</div>
        ${locOf(w)?`<div class="loc">${locOf(w)}</div>`:''}
      </div>
      <div class="eqIcon"><span></span><span></span><span></span></div>
      <button class="handle" aria-label="reorder">≡</button>`;
    li.onclick=e=>{if(!e.target.closest('.handle'))playIndex(i,true);};
    li.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();playIndex(i,true);}};
    ol.appendChild(li);
  });
  enableDrag(ol);markActive();
}

/* ---------- drag & drop ---------- */
function enableDrag(ol){
  let el=null;
  ol.querySelectorAll('.handle').forEach(h=>{
    h.addEventListener('pointerdown',ev=>{ev.preventDefault();el=h.closest('.work');el.classList.add('dragging');h.setPointerCapture(ev.pointerId);});
    h.addEventListener('pointermove',ev=>{
      if(!el)return;
      const rest=[...ol.querySelectorAll('.work:not(.dragging)')];
      const after=rest.find(r=>ev.clientY<r.getBoundingClientRect().top+r.offsetHeight/2);
      after?ol.insertBefore(el,after):ol.appendChild(el);
    });
    h.addEventListener('pointerup',()=>{
      if(!el)return;
      el.classList.remove('dragging');el=null;
      const ids=[...ol.querySelectorAll('.work')].map(x=>x.id.replace('oeuvre-',''));
      WORKS=orderWorks(WORKS,ids);
      localStorage.setItem('ma_order_'+expoId,JSON.stringify(ids));
      renderList();
    });
  });
}

/* ---------- reproducción ---------- */
const isPlaying=()=>usingTTS?speechSynthesis.speaking&&!speechSynthesis.paused:(!audio.paused&&!audio.ended);

function playIndex(i,expand){
  stopNarration();
  idx=i;
  const w=WORKS[i];
  markPlayed(w);
  if(!hpShown){hpShown=true;toast(t('hp'));}
  history.replaceState(null,'','#expo/'+expoId+'/oeuvre-'+w.id);
  fillNowPlaying(w,i);
  $('#mini').classList.add('open');
  if(expand)$('#now').classList.add('open');
  usingTTS=false;
  audio.src=audioUrl(w);
  audio.playbackRate=speed;
  audio.play().then(()=>setMediaSession(w,i)).catch(()=>startTTS(w));
  if(ambientOn)ambient.play().catch(()=>{});
  updateUI();
}
function fillNowPlaying(w,i){
  $('#nowMedal').textContent=numeral(i);
  $('#miniMedal').textContent=numeral(i);
  $('#nTitle').textContent=wMeta(w).t;
  $('#miniTitle').textContent=wMeta(w).t;
  $('#nMeta').textContent=wMeta(w).m;
  $('#nLoc').textContent=locOf(w);
  $('#nExpo').textContent=N(expo.title);
  $('#tBody').textContent=w.txt[workLang(w)];
}
function estimateSpeechSeconds(text,spd){
  const words=(text||'').trim().split(/\s+/).filter(Boolean).length;
  const WPM=155; // ritmo natural de narración a velocidad 1×
  return Math.max(8, words/WPM*60/(spd||1));
}
function startTtsClock(){
  clearInterval(ttsTimer);
  ttsTimer=setInterval(tickTtsClock,250);
  tickTtsClock();
}
function stopTtsClock(){ clearInterval(ttsTimer); ttsTimer=null; }
function tickTtsClock(){
  if(!usingTTS)return;
  let elapsed=ttsElapsedBase;
  if(speechSynthesis.speaking&&!speechSynthesis.paused) elapsed+=(Date.now()-ttsStart)/1000;
  elapsed=Math.min(elapsed,ttsEstDuration);
  const p=ttsEstDuration?elapsed/ttsEstDuration*100:0;
  $('#seek').value=p; $('#miniBar').style.width=p+'%';
  $('#tCur').textContent=fmt(elapsed);
  $('#tTot').textContent='~'+fmt(ttsEstDuration); // el ~ deja claro que es estimado, no exacto
}
function startTTS(w){
  if(!('speechSynthesis' in window))return;
  usingTTS=true;
  $('#ttsNote').classList.add('show');
  const wl=workLang(w);
  const u=new SpeechSynthesisUtterance(w.txt[wl]);
  u.lang=(LANGS.find(l=>l.code===wl)||{bcp:'fr-CA'}).bcp;
  u.rate=speed;
  ttsEstDuration=estimateSpeechSeconds(w.txt[wl],speed);
  ttsElapsedBase=0; ttsStart=Date.now();
  startTtsClock();
  u.onend=()=>{stopTtsClock();updateUI();next();};
  speechSynthesis.speak(u);
  updateUI();
}
function stopNarration(){
  audio.pause();audio.removeAttribute('src');audio.load();
  if('speechSynthesis' in window)speechSynthesis.cancel();
  usingTTS=false;$('#ttsNote').classList.remove('show');
  stopTtsClock();
}
function togglePlay(){
  if(idx<0){if(WORKS.length)playIndex(0,false);return;}
  if(usingTTS){
    if(speechSynthesis.paused){ speechSynthesis.resume(); ttsStart=Date.now(); }
    else if(speechSynthesis.speaking){ ttsElapsedBase+=(Date.now()-ttsStart)/1000; speechSynthesis.pause(); }
    else startTTS(WORKS[idx]);
  }else{
    audio.paused?audio.play().catch(()=>startTTS(WORKS[idx])):audio.pause();
  }
  if(ambientOn){setTimeout(()=>{isPlaying()?ambient.play().catch(()=>{}):ambient.pause();},90);}
  setTimeout(updateUI,90);
}
const next=()=>{
  const reachedEnd = idx>=WORKS.length-1;
  if(!reachedEnd && !pendingAutoDone){ playIndex(idx+1,false); return; }
  stopNarration();ambient.pause();updateUI();
  pendingAutoDone=false;
  showDone();
};
const prev=()=>{if(audio.currentTime>4&&!usingTTS){audio.currentTime=0;return;}if(idx>0)playIndex(idx-1,false);};
$('#playBtn').onclick=togglePlay;
$('#miniPlay').onclick=e=>{e.stopPropagation();togglePlay();};
$('#nextBtn').onclick=next;
$('#prevBtn').onclick=prev;
$('#playAllBtn').onclick=()=>WORKS.length&&playIndex(0,true);
$('#speedBtn').onclick=()=>{
  speed=SPEEDS[(SPEEDS.indexOf(speed)+1)%SPEEDS.length];
  $('#speedBtn').textContent=speed+'×';
  audio.playbackRate=speed;
  if(usingTTS&&isPlaying()){speechSynthesis.cancel();startTTS(WORKS[idx]);}
};

/* ---------- Media Session ---------- */
function setMediaSession(w,i){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({
    title:numeral(i)+' · '+wMeta(w).t,
    artist:N(expo.title),
    album:'MuseAudio',
    artwork:[{src:'icons/icon-512.png',sizes:'512x512',type:'image/png'}]
  });
  navigator.mediaSession.setActionHandler('play',togglePlay);
  navigator.mediaSession.setActionHandler('pause',togglePlay);
  navigator.mediaSession.setActionHandler('previoustrack',prev);
  navigator.mediaSession.setActionHandler('nexttrack',next);
  try{navigator.mediaSession.setActionHandler('seekto',d=>{if(audio.duration)audio.currentTime=d.seekTime;});}catch{}
}

/* ---------- ambiente ---------- */
function toggleAmbient(){
  ambientOn=!ambientOn;
  if(ambientOn&&expo){
    ambient.play().catch(()=>{ambientOn=false;syncAmbUI();toast(t('ambSoon'));});
  }
  else ambient.pause();
  syncAmbUI();
}
function syncAmbUI(){['#ambBtn','#nAmb'].forEach(s=>{const b=$(s);b.classList.toggle('on',ambientOn);b.setAttribute('aria-pressed',ambientOn);});}
$('#ambBtn').onclick=toggleAmbient;
$('#nAmb').onclick=toggleAmbient;

/* ---------- Now Playing ---------- */
$('#mini').onclick=()=>$('#now').classList.add('open');
$('#nowClose').onclick=()=>$('#now').classList.remove('open');
$('#txtBtn').onclick=()=>{
  const p=$('#transcript');
  const on=!p.classList.contains('show');
  p.classList.toggle('show',on);
  $('#txtBtn').classList.toggle('on',on);
  $('#txtBtn').setAttribute('aria-pressed',on);
};

/* ---------- toast ---------- */
let toastTimer=null;
function toast(msg){
  const el=$('#toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),3200);
}

/* ---------- fin + voto + correo ---------- */
function send(payload){
  try{if(WEBHOOK_URL)fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({...payload,expo:expoId,lang,ts:Date.now()})});}catch{}
}
function showDone(){
  $('#now').classList.remove('open');
  $('#mini').classList.remove('open');
  $('#doneTitle').textContent=t('doneTitle');
  $('#doneStats').textContent=t('doneStats').replace('{n}',realPlayedCount()).replace('{total}',realWorks().length).replace('{e}',N(expo.title));
  $('#favQ').textContent=t('favQ');
  $('#favThanks').textContent='';
  $('#shareBtn').textContent=t('share');
  $('#moreBtn').textContent=t('another');
  $('#mailQ').textContent=t('mailQ');
  $('#mailNote').innerHTML=t('mailNote')+' <a href="legal.html">'+t('footLink')+'</a>';
  // favoritos: selección múltiple, persistida como arreglo (con compatibilidad hacia el formato viejo de un solo id)
  let favIds=[];
  try{
    const raw=localStorage.getItem('ma_fav_'+expoId);
    if(raw) favIds=JSON.parse(raw);
    if(!Array.isArray(favIds)) favIds=[raw]; // formato antiguo: string suelto
  }catch{ favIds=[]; }
  const favSel=new Set(favIds);
  const g=$('#favGrid');g.innerHTML='';
  realWorks().forEach((w)=>{
    const i=WORKS.indexOf(w);
    const b=document.createElement('button');
    b.className='favBtn'+(favSel.has(w.id)?' sel':'');
    b.setAttribute('aria-pressed',favSel.has(w.id));
    b.innerHTML='<span class="fN">'+numeral(i)+'</span>'+wMeta(w).t;
    b.onclick=()=>{
      if(favSel.has(w.id)){favSel.delete(w.id);b.classList.remove('sel');b.setAttribute('aria-pressed','false');}
      else{favSel.add(w.id);b.classList.add('sel');b.setAttribute('aria-pressed','true');}
      $('#favThanks').textContent=favSel.size?t('favThanks'):'';
      localStorage.setItem('ma_fav_'+expoId,JSON.stringify([...favSel]));
      send({type:'favorite',works:[...favSel]});
    };
    g.appendChild(b);
  });
  if(favSel.size) $('#favThanks').textContent=t('favThanks');
  send({type:'completed',works:realPlayedCount(),total:realWorks().length});
  show('vDone');
}
$('#shareBtn').onclick=()=>{
  const url=location.origin+location.pathname+'#expo/'+expoId;
  const text=t('shareTxt')+' — '+N(expo.title);
  if(navigator.share){navigator.share({title:'MuseAudio',text,url}).catch(()=>{});}
  else window.open('https://wa.me/?text='+encodeURIComponent(text+' '+url),'_blank');
};
$('#moreBtn').onclick=()=>{played=new Set();expo=null;expoId=null;setAccent(null);openMuseum(museum.id,true);};
$('#mailBtn').onclick=()=>{
  const v=$('#mailIn').value.trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v)){toast(t('mailErr'));return;}
  send({type:'subscribe',email:v});
  localStorage.setItem('ma_mail','1');
  $('#mailIn').value='';$('#mailIn').blur();
  toast(t('mailOk'));
};

/* ---------- descarga offline ---------- */
$('#dlBtn').onclick=async()=>{
  if(!WORKS.length||$('#dlBtn').classList.contains('busy'))return;
  const btn=$('#dlBtn');btn.classList.add('busy');
  let ok=0;
  const cache=('caches' in window)?await caches.open('museaudio-v5').catch(()=>null):null;
  for(let i=0;i<WORKS.length;i++){
    $('#dlSt').textContent=(i+1)+'/'+WORKS.length;
    const url=audioUrl(WORKS[i]);
    try{const res=await fetch(url);if(res.ok){if(cache)await cache.put(url,res.clone());ok++;}}catch{}
  }
  btn.classList.remove('busy');
  if(ok===WORKS.length){btn.classList.add('done');$('#dlSt').textContent=t('dlDone');}
  else $('#dlSt').textContent=ok+'/'+WORKS.length;
};

/* ---------- UI reproductor ---------- */
audio.addEventListener('ended',()=>{updateUI();next();});
audio.addEventListener('timeupdate',()=>{
  const p=audio.duration?audio.currentTime/audio.duration*100:0;
  $('#seek').value=p;$('#miniBar').style.width=p+'%';
  $('#tCur').textContent=fmt(audio.currentTime);
  $('#tTot').textContent=audio.duration?fmt(audio.duration):'–:––';
});
audio.addEventListener('play',updateUI);
audio.addEventListener('pause',updateUI);
$('#seek').oninput=e=>{if(!usingTTS&&audio.duration)audio.currentTime=e.target.value/100*audio.duration;};
const fmt=s=>{s=Math.floor(s||0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};
function updateUI(){
  const play='<path d="M8 5v14l11-7z"/>',pause='<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  $('#playIcon').innerHTML=isPlaying()?pause:play;
  $('#miniIcon').innerHTML=isPlaying()?pause:play;
  if(idx>=0)$('#miniSt').textContent=isPlaying()?(expo?N(expo.title):''):t('paused');
  markActive();
}
function markActive(){
  document.querySelectorAll('.work').forEach(el=>{
    const w=WORKS[idx];
    const on=w&&el.id==='oeuvre-'+w.id;
    el.classList.toggle('active',on);
    el.classList.toggle('playing',on&&isPlaying());
  });
}
setInterval(updateUI,600);

/* ---------- deep links ---------- */
function handleHash(){
  const mm=location.hash.match(/^#m\/([\w-]+)$/);
  const me=location.hash.match(/^#expo\/([\w-]+)(?:\/oeuvre-([\w-]+))?$/);
  const legacy=location.hash.match(/^#oeuvre-([\w-]+)$/);
  if(mm){openMuseum(mm[1],false);return;}
  if(legacy){openExpo('torlonia',true);const i=WORKS.findIndex(w=>w.id===legacy[1]);if(i>=0)playIndex(i,true);return;}
  if(!me)return;
  openExpo(me[1],false);
  if(me[2]){const i=WORKS.findIndex(w=>w.id===me[2]);
    if(i>=0){document.getElementById('oeuvre-'+me[2])?.scrollIntoView({block:'center'});playIndex(i,true);}}
}
window.addEventListener('hashchange',()=>{if(lang)handleHash();});

/* ---------- init ---------- */
buildLangScreen();
if(lang&&UI[lang]){setLang(lang);}else{$('#vLang').classList.add('on');}
if(location.protocol!=='file:'&&'serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
