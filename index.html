<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf8f3">
<meta name="description" content="MuseAudio — audioguide multilingue et gratuit pour vos visites au musée. Écoutez chaque œuvre, le téléphone dans la poche.">
<title>MuseAudio — Le musée, dans votre langue</title>

<!-- Vista previa al compartir el enlace (WhatsApp, iMessage, redes) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="MuseAudio">
<meta property="og:title" content="MuseAudio — Le musée, dans votre langue">
<meta property="og:description" content="Audioguide multilingue et gratuit pour vos visites au musée. Écoutez chaque œuvre, le téléphone dans la poche.">
<meta property="og:image" content="https://antonydis.github.io/museaudio/social-preview.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:url" content="https://antonydis.github.io/museaudio/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="MuseAudio — Le musée, dans votre langue">
<meta name="twitter:description" content="Audioguide multilingue et gratuit pour vos visites au musée.">
<meta name="twitter:image" content="https://antonydis.github.io/museaudio/social-preview.png">

<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* base editorial clara (navegación) */
  --paper:#faf8f3;
  --card:#ffffff;
  --txt:#191919;
  --dim:#63635e;
  --line:rgba(25,25,25,.12);
  --acc:#8a6428;        /* acento sobre claro (por expo) */
  /* reproductor oscuro (inmersión) */
  --pk-ink:#111418;
  --pk-panel:#1d222a;
  --pk-txt:#efeae0;
  --pk-dim:#a2a8b0;
  --glow:#c8964b;       /* acento sobre oscuro (por expo) */
  --r:18px;
  --tap:48px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--paper);color:var(--txt);font-family:'IBM Plex Sans',system-ui,sans-serif;
  min-height:100dvh;line-height:1.55;font-size:16px}
button{font:inherit;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.serif{font-family:'Marcellus',serif;font-weight:400}
.eyebrow{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc)}
:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:8px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ===== medallón: placa numerada de museo ===== */
.medal{display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:'Marcellus',serif;color:var(--acc);
  border:1.5px solid color-mix(in srgb,var(--acc) 50%,transparent);border-radius:50%;
  background:color-mix(in srgb,var(--acc) 7%,transparent)}
.medal.s{width:46px;height:46px;font-size:17px}
.medal.xl{width:148px;height:148px;font-size:52px;border-width:2px}
.dark .medal, #now .medal{color:var(--glow);border-color:color-mix(in srgb,var(--glow) 55%,transparent);
  background:radial-gradient(circle at 35% 30%,color-mix(in srgb,var(--glow) 14%,transparent),transparent 70%)}

.view{display:none;max-width:560px;margin:0 auto;padding:0 20px 140px}
.view.on{display:block}

/* ===== idioma ===== */
#vLang{position:fixed;inset:0;z-index:60;display:none;flex-direction:column;align-items:center;
  justify-content:center;padding:32px 24px;text-align:center;background:var(--paper)}
#vLang.on{display:flex}
#vLang .brand{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--acc)}
#vLang h1{font-size:clamp(30px,7.5vw,42px);margin:14px 0 6px;line-height:1.15}
#vLang p{color:var(--dim);max-width:320px;margin:0 auto 30px;font-size:15px}
.langGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:440px}
.langBtn{min-height:56px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:13px 12px;font-size:17px;transition:border-color .15s,transform .1s;box-shadow:0 1px 3px rgba(25,25,25,.05)}
.langBtn:active{transform:scale(.97)}
.langBtn:hover{border-color:var(--acc)}

/* ===== barra superior ===== */
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 0 4px}
.top .brand{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--acc);
  border:none;background:none;padding:12px 0;min-height:var(--tap)}
.pill{min-height:40px;background:var(--card);border:1px solid var(--line);color:var(--dim);
  border-radius:999px;padding:8px 16px;font-size:13px}
.pill:hover{border-color:var(--acc);color:var(--txt)}
.backRow{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:15px;
  background:none;border:none;padding:12px 12px 12px 0;min-height:var(--tap)}
.backRow:hover{color:var(--txt)}

/* ===== landing plataforma ===== */
.hero{padding:26px 0 8px}
.hero h1{font-size:clamp(32px,9vw,46px);line-height:1.12;margin:6px 0 12px;letter-spacing:-.01em}
.hero p{color:var(--dim);font-size:16.5px;max-width:40ch}
.how{display:flex;flex-direction:column;gap:0;margin:26px 0 8px;border-top:1px solid var(--line)}
.step{display:flex;gap:16px;align-items:center;padding:16px 0;border-bottom:1px solid var(--line)}
.step .n{font-family:'Marcellus',serif;font-size:22px;color:var(--acc);min-width:28px;text-align:center}
.step b{display:block;font-weight:600;font-size:15.5px}
.step span{color:var(--dim);font-size:14px}
.secTitle{font-family:'Marcellus',serif;font-size:22px;margin:30px 0 14px}

/* ===== tarjetas museo ===== */
.musCard{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:22px 20px;margin-bottom:12px;box-shadow:0 2px 10px rgba(25,25,25,.06);transition:border-color .15s,transform .12s}
.musCard:hover{border-color:var(--acc)}
.musCard:active{transform:scale(.99)}
.musCard h3{font-family:'Marcellus',serif;font-weight:400;font-size:21px;line-height:1.25;margin:4px 0 3px}
.musCard .city{color:var(--dim);font-size:14px}
.musCard .foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.musCard .n{color:var(--acc);font-size:13px;font-weight:500}
.musCard .go{color:var(--acc);font-size:14px;font-weight:600}
.musCard.soonCard{opacity:.65;cursor:default;box-shadow:none;background:transparent;border-style:dashed}
.musCard.soonCard:hover{border-color:var(--line)}

/* ===== tarjetas expo ===== */
.expoCard{position:relative;width:100%;text-align:left;background:var(--card);
  border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:12px;overflow:hidden;
  box-shadow:0 2px 10px rgba(25,25,25,.06);transition:border-color .15s,transform .12s}
.expoCard::before{content:'';position:absolute;inset-inline-start:0;top:0;bottom:0;width:4px;background:var(--card-acc)}
.expoCard:hover{border-color:color-mix(in srgb,var(--card-acc) 55%,var(--line))}
.expoCard:active{transform:scale(.99)}
.expoCard .eyebrow{color:var(--card-acc)}
.expoCard h2{font-family:'Marcellus',serif;font-weight:400;font-size:21px;line-height:1.24;margin:6px 0 4px;padding-inline-end:56px}
.expoCard .tag{color:var(--dim);font-size:14px}
.expoCard .foot{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap}
.expoCard .dates{color:var(--dim);font-size:12.5px}
.expoCard .chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:10.5px;letter-spacing:.06em;color:var(--card-acc);border:1px solid color-mix(in srgb,var(--card-acc) 40%,transparent);
  border-radius:6px;padding:2px 6px;text-transform:uppercase}
.badge{position:absolute;top:14px;inset-inline-end:14px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  padding:5px 10px;border-radius:999px;color:#fff;background:var(--card-acc)}

/* ===== playlist ===== */
#vExpo h1{font-size:clamp(24px,6.5vw,31px);margin:8px 0 2px}
#vExpo .sub{color:var(--dim);font-size:14px}
.actions{display:flex;gap:10px;margin:18px 0}
.playAll{flex:1;min-height:56px;display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--acc);color:#fff;border:none;border-radius:999px;padding:14px 18px;font-weight:600;font-size:16px;
  box-shadow:0 4px 14px color-mix(in srgb,var(--acc) 35%,transparent)}
.playAll:active{transform:scale(.99)}
.sqBtn{width:56px;min-height:56px;border-radius:var(--r);border:1px solid var(--line);background:var(--card);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:11px;color:var(--dim)}
.sqBtn svg{width:20px;height:20px;fill:var(--dim)}
.sqBtn.on,.sqBtn.done{border-color:var(--acc);color:var(--acc)}
.sqBtn.on svg,.sqBtn.busy svg,.sqBtn.done svg{fill:var(--acc)}
ol.works{list-style:none}
.work{display:flex;gap:13px;align-items:center;background:var(--card);border:1px solid var(--line);
  border-radius:var(--r);padding:12px 6px 12px 13px;margin-bottom:10px;cursor:pointer;
  transition:border-color .15s;user-select:none;-webkit-user-select:none;box-shadow:0 1px 4px rgba(25,25,25,.04)}
.work:hover{border-color:color-mix(in srgb,var(--acc) 55%,var(--line))}
.work.active{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 6%,var(--card))}
.work.dragging{opacity:.45;border-style:dashed}
.work .info{flex:1;min-width:0}
.work h3{font-family:'Marcellus',serif;font-weight:400;font-size:17px;line-height:1.3}
.work .meta{color:var(--dim);font-size:13px;margin-top:2px}
.work .loc{color:var(--acc);font-size:12px;margin-top:4px}
.handle{flex-shrink:0;min-width:var(--tap);min-height:var(--tap);display:flex;align-items:center;justify-content:center;
  color:var(--dim);touch-action:none;cursor:grab;border:none;background:none;font-size:18px;border-radius:12px}
.eqIcon{display:none;gap:2.5px;align-items:flex-end;height:15px;flex-shrink:0}
.work.playing .eqIcon{display:flex}
.eqIcon span{width:3px;background:var(--acc);border-radius:2px;animation:eq 1s ease-in-out infinite}
.eqIcon span:nth-child(2){animation-delay:.2s}
.eqIcon span:nth-child(3){animation-delay:.4s}
@keyframes eq{0%,100%{height:4px}50%{height:15px}}
.hint{color:var(--dim);font-size:12px;text-align:center;margin:16px 0 0}
.empty{border:1px dashed var(--line);border-radius:var(--r);padding:34px 22px;text-align:center;color:var(--dim)}
.empty .serif{font-size:19px;color:var(--txt);margin-bottom:6px}
.langNote{color:var(--dim);font-size:12.5px;margin-top:6px}
.langNote b{color:var(--acc);font-weight:600}
.progressBox{margin-top:14px}
.progressBox.hidden{display:none}
.progressTop{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;color:var(--dim);margin-bottom:6px}
.progressTop b{color:var(--acc);font-weight:600}
.finishLink{background:none;border:none;color:var(--dim);font-size:12.5px;text-decoration:underline;text-underline-offset:2px;padding:4px 0}
.finishLink:hover{color:var(--acc)}
.progressTrack{height:4px;background:var(--line);border-radius:3px;overflow:hidden}
.progressFill{height:100%;width:0;background:var(--acc);border-radius:3px;transition:width .3s ease}
.progressFill.done{background:linear-gradient(90deg,var(--acc),color-mix(in srgb,var(--acc) 60%,#4caf50))}

/* ===== mini reproductor (oscuro, Spotify-like) ===== */
#mini{position:fixed;left:12px;right:12px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:40;
  display:none;align-items:center;gap:12px;max-width:536px;margin:0 auto;
  background:rgba(17,20,24,.93);backdrop-filter:blur(16px);color:var(--pk-txt);
  border:1px solid rgba(239,234,224,.12);border-radius:20px;padding:10px 12px;
  box-shadow:0 12px 36px rgba(0,0,0,.4);cursor:pointer}
#mini.open{display:flex}
#mini .info{flex:1;min-width:0}
#mini h4{font-family:'Marcellus',serif;font-weight:400;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mini .st{color:var(--pk-dim);font-size:12px}
#mini .mPlay{min-width:var(--tap);min-height:var(--tap);border:none;background:var(--glow);color:#111418;
  border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#mini .mPlay svg{width:20px;height:20px;fill:currentColor}
#mini .bar{position:absolute;left:20px;right:20px;bottom:0;height:2px;background:rgba(239,234,224,.14);border-radius:2px;overflow:hidden}
#mini .bar i{display:block;height:100%;width:0;background:var(--glow)}

/* ===== Now Playing (oscuro inmersivo) ===== */
#now{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;color:var(--pk-txt);
  padding:18px 24px calc(26px + env(safe-area-inset-bottom));
  background:
    radial-gradient(120% 75% at 50% -15%, color-mix(in srgb,var(--glow) 17%,transparent) 0%, transparent 60%),
    linear-gradient(#171b21,var(--pk-ink));
  transform:translateY(103%);transition:transform .3s cubic-bezier(.3,.8,.3,1)}
#now.open{transform:translateY(0)}
#now .nTop{display:flex;align-items:center;justify-content:space-between}
#now .nClose{min-width:var(--tap);min-height:var(--tap);background:none;border:none;color:var(--pk-dim);
  display:flex;align-items:center;justify-content:center}
#now .nClose svg{width:26px;height:26px;fill:currentColor}
#now .nExpo{font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--glow);
  text-align:center;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 8px}
#now .nCenter{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;gap:18px;min-height:0;padding:10px 0}
#now h2{font-size:clamp(23px,6.5vw,30px);line-height:1.22;max-width:22ch}
#now .nMeta{color:var(--pk-dim);font-size:15px;margin-top:-8px}
#now .nLoc{color:var(--glow);font-size:13px;margin-top:-10px}
#seek{width:100%;accent-color:var(--glow);height:5px;cursor:pointer}
.nTimes{display:flex;justify-content:space-between;font-size:12px;color:var(--pk-dim);margin-top:4px}
.nControls{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.ctrl{background:none;border:none;color:var(--pk-txt);min-width:var(--tap);min-height:var(--tap);
  display:flex;align-items:center;justify-content:center;border-radius:14px}
.ctrl svg{width:30px;height:30px;fill:currentColor}
.ctrl.giant{background:var(--glow);color:#111418;border-radius:50%;width:78px;height:78px}
.ctrl.giant svg{width:34px;height:34px}
.ctrl.giant:active{transform:scale(.96)}
#speedBtn{font-size:13px;color:var(--pk-dim);border:1px solid rgba(239,234,224,.14);border-radius:999px;
  background:none;min-width:56px;min-height:40px;padding:6px 10px}
#txtBtn{font-size:15px}
#txtBtn.on{color:var(--glow)}
#nAmb{border:none;background:none;min-width:var(--tap);min-height:var(--tap);border-radius:14px}
#nAmb svg{width:22px;height:22px;fill:var(--pk-dim)}
#nAmb.on svg{fill:var(--glow)}
.ttsNote{font-size:11.5px;color:var(--pk-dim);text-align:center;margin-top:12px;display:none}
.ttsNote.show{display:block}
#transcript{display:none;position:absolute;inset:64px 24px 200px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:rgba(17,20,24,.86);backdrop-filter:blur(6px);border:1px solid rgba(239,234,224,.12);
  border-radius:var(--r);padding:22px 20px;font-size:17px;line-height:1.75;color:var(--pk-txt)}
#transcript.show{display:block}
#transcript .tTitle{font-family:'Marcellus',serif;font-size:15px;color:var(--glow);letter-spacing:.06em;margin-bottom:12px}

/* ===== toast ===== */
#toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(12px);
  z-index:70;background:#22262c;color:#efeae0;border:1px solid rgba(239,234,224,.14);border-radius:999px;
  padding:11px 20px;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,.4);
  opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== fin del recorrido ===== */
#vDone{text-align:center;padding-top:7vh}
#vDone .medal.xl{margin:0 auto 8px}
#vDone h1{font-size:clamp(26px,7vw,36px);margin:16px 0 4px}
#vDone .stats{color:var(--dim);font-size:15px;margin-bottom:28px}
#vDone .q{font-family:'Marcellus',serif;font-size:19px;margin:26px 0 14px}
.favGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:start}
.favBtn{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;
  min-height:56px;font-size:14px;line-height:1.35;transition:border-color .15s;box-shadow:0 1px 4px rgba(25,25,25,.04)}
.favBtn:hover{border-color:var(--acc)}
.favBtn.sel{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 8%,var(--card))}
.favBtn .fN{font-family:'Marcellus',serif;color:var(--acc);margin-inline-end:7px}
.thanks{color:var(--acc);font-size:14px;margin-top:14px;min-height:20px}
.doneActions{display:flex;flex-direction:column;gap:10px;margin-top:28px}
.btnPrimary{min-height:56px;background:var(--acc);color:#fff;border:none;border-radius:999px;
  font-weight:600;font-size:16px;display:flex;align-items:center;justify-content:center;gap:10px}
.btnGhost{min-height:52px;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:999px;font-size:15px}
.btnGhost:hover{border-color:var(--acc)}
.mailRow{display:flex;gap:8px;margin-top:10px}
.mailRow input{flex:1;min-height:52px;background:var(--card);border:1px solid var(--line);border-radius:14px;
  color:var(--txt);font:inherit;font-size:15px;padding:0 16px}
.mailRow input::placeholder{color:var(--dim)}
.mailRow button{min-width:56px;min-height:52px;border-radius:14px;border:none;background:var(--acc);color:#fff;font-weight:600}
.mailNote{color:var(--dim);font-size:12px;margin-top:8px}
.mailNote a{color:var(--acc)}

/* ===== footer legal ===== */
.legalFoot{margin-top:36px;padding-top:18px;border-top:1px solid var(--line);
  color:var(--dim);font-size:12.5px;line-height:1.6;text-align:center}
.legalFoot a{color:var(--acc);text-decoration:none}
</style>
</head>
<body>

<!-- 1 · Idioma -->
<section id="vLang" aria-label="language selection">
  <div class="brand">MuseAudio</div>
  <h1 class="serif" id="langTitle">Votre visite, dans votre langue</h1>
  <p id="langSub">Choisissez la langue de votre parcours audio</p>
  <div class="langGrid" id="langGrid"></div>
</section>

<!-- 2 · Landing plataforma + museos -->
<section class="view" id="vHome">
  <div class="top">
    <button class="brand" id="brandBtn">MuseAudio</button>
    <button class="pill" id="langSwitch"></button>
  </div>
  <div class="hero">
    <div class="eyebrow" data-i18n="heroEyebrow"></div>
    <h1 class="serif" data-i18n="heroTitle"></h1>
    <p data-i18n="heroSub"></p>
  </div>
  <div class="how">
    <div class="step"><div class="n">I</div><div><b data-i18n="s1"></b><span data-i18n="s1s"></span></div></div>
    <div class="step"><div class="n">II</div><div><b data-i18n="s2"></b><span data-i18n="s2s"></span></div></div>
    <div class="step"><div class="n">III</div><div><b data-i18n="s3"></b><span data-i18n="s3s"></span></div></div>
  </div>
  <h2 class="secTitle" data-i18n="museums"></h2>
  <div id="musCards"></div>
  <footer class="legalFoot"><span id="footTxt"></span> <a href="legal.html" id="footLink"></a></footer>
</section>

<!-- 3 · Museo: exposiciones -->
<section class="view" id="vMuseum">
  <div class="top">
    <button class="backRow" id="backHome">←&nbsp;<span data-i18n="back"></span></button>
    <button class="pill" id="langSwitch2"></button>
  </div>
  <div class="eyebrow" id="musEyebrow"></div>
  <h1 class="serif" id="musTitle" style="font-size:clamp(26px,7vw,34px);margin:8px 0 2px"></h1>
  <div style="color:var(--dim);font-size:14px" id="musCity"></div>
  <h2 class="secTitle" data-i18n="exhibitions"></h2>
  <div id="expoCards"></div>
</section>

<!-- 4 · Exposición: playlist -->
<section class="view" id="vExpo">
  <div class="top">
    <button class="backRow" id="backMus">←&nbsp;<span id="backMusTxt"></span></button>

Hulyo 19, 2026","pt":"Até 19 de julho de 2026","it":"Fino al 19 luglio 2026"},"tag":{"fr":"Chefs-d'œuvre de la sculpture romaine","en":"Masterpieces of Roman sculpture","es":"Obras maestras de la escultura romana","ar":"روائع النحت الروماني","zh":"罗马雕塑杰作","tl":"Mga obra maestra ng eskulturang Romano","pt":"Obras-primas da escultura romana","it":"Capolavori della scultura romana"},"status":"closing","numerals":"arabic","accent":"#c8964b","accentUI":"#8a6428","ambient":"audio/ambient_torlonia.mp3","langs":["fr","en","es"]},"horssocle":{"title":{"fr":"Hors socle","en":"Off the Pedestal","es":"Fuera del pedestal","ar":"خارج القاعدة","zh":"走下基座","tl":"Labas sa Pedestal","pt":"Fora do pedestal","it":"Fuori dal piedistallo"},"dates":{"fr":"Jusqu'au 7 mars 2027","en":"Until March 7, 2027","es":"Hasta el 7 de marzo de 2027","ar":"حتى 7 مارس 2027","zh":"至2027年3月7日","tl":"Hanggang Marso 7, 2027","pt":"Até 7 de março de 2027","it":"Fino al 7 marzo 2027"},"tag":{"fr":"La sculpture depuis les années 1960","en":"Sculpture since the 1960s","es":"La escultura desde los años 1960","ar":"النحت منذ ستينيات القرن العشرين","zh":"1960年代以来的雕塑","tl":"Eskultura mula noong dekada 1960","pt":"A escultura desde os anos 1960","it":"La scultura dagli anni Sessanta"},"status":"soon","numerals":"arabic","accent":"#8fb5c4","accentUI":"#41748a","ambient":"audio/ambient_horssocle.mp3","langs":["fr","en","es"]}},"works":{"enpiste":[{"id":"sprint","placeholder":true,"meta":{"fr":{"t":"Le sprint","m":"Bronze · 1948"},"en":{"t":"The Sprint","m":"Bronze · 1948"},"es":{"t":"El sprint","m":"Bronce · 1948"}},"loc":{"fr":"Pavillon Jean-Noël Desmarais · niveau 2","en":"Jean-Noël Desmarais Pavilion · Level 2","es":"Pabellón Jean-Noël Desmarais · nivel 2"},"txt":{"fr":"Un coureur figé au moment précis où son pied quitte le sol. Le bronze capte ce que l'œil ne voit jamais : l'instant suspendu entre deux foulées. Le sculpteur a travaillé d'après des photographies de course, héritage direct des études du mouvement qui fascinaient les artistes du vingtième siècle.","en":"A runner frozen at the precise moment his foot leaves the ground. The bronze captures what the eye never sees: the suspended instant between two strides. The sculptor worked from racing photographs, a direct legacy of the motion studies that fascinated twentieth-century artists.","es":"Un corredor congelado en el momento preciso en que su pie deja el suelo. El bronce capta lo que el ojo nunca ve: el instante suspendido entre dos zancadas. El escultor trabajó a partir de fotografías de carreras, herencia directa de los estudios del movimiento que fascinaban a los artistas del siglo veinte."}},{"id":"patineurs","placeholder":true,"meta":{"fr":{"t":"Patineurs au parc La Fontaine","m":"Huile sur toile · 1937"},"en":{"t":"Skaters at La Fontaine Park","m":"Oil on canvas · 1937"},"es":{"t":"Patinadores en el parque La Fontaine","m":"Óleo sobre lienzo · 1937"}},"loc":{"fr":"Pavillon Claire et Marc Bourgie · niveau 3","en":"Claire and Marc Bourgie Pavilion · Level 3","es":"Pabellón Claire et Marc Bourgie · nivel 3"},"txt":{"fr":"Sous un ciel d'hiver montréalais, des silhouettes glissent sur la glace du parc La Fontaine. Le sport ici n'est pas une compétition : c'est un rituel collectif, presque une danse. Remarquez comme la lumière basse de l'après-midi transforme la glace en miroir rose et gris.","en":"Under a Montreal winter sky, silhouettes glide across the ice of La Fontaine Park. Sport here is not a competition: it is a collective ritual, almost a dance. Notice how the low afternoon light turns the ice into a mirror of pink and grey.","es":"Bajo un cielo de invierno montrealés, unas siluetas se deslizan sobre el hielo del parque La Fontaine. El deporte aquí no es competencia: es un ritual colectivo, casi una danza. Observe cómo la luz baja de la tarde convierte el hielo en un espejo rosa y gris."}},{"id":"gymnaste","placeholder":true,"meta":{"fr":{"t":"Gymnaste au repos","m":"Épreuve argentique · 1976"},"en":{"t":"Gymnast at Rest","m":"Gelatin silver print · 1976"},"es":{"t":"Gimnasta en reposo","m":"Copia a la gelatina de plata · 1976"}},"loc":{"fr":"Pavillon Jean-Noël Desmarais · niveau 1","en":"Jean-Noël Desmarais Pavilion · Level 1","es":"Pabellón Jean-Noël Desmarais · nivel 1"},"txt":{"fr":"Montréal, été 1976. Entre deux épreuves olympiques, une gymnaste s'assoit, les mains poudrées de magnésie. Le photographe n'a pas choisi l'exploit mais l'attente : c'est là, dit cette image, que vit le sport, dans la concentration silencieuse avant le geste parfait.","en":"Montreal, summer 1976. Between two Olympic events, a gymnast sits down, her hands dusted with chalk. The photographer chose not the feat but the waiting: this, the image says, is where sport truly lives, in the silent concentration before the perfect move.","es":"Montreal, verano de 1976. Entre dos pruebas olímpicas, una gimnasta se sienta, con las manos empolvadas de magnesia. El fotógrafo no eligió la hazaña sino la espera: ahí, dice esta imagen, vive el deporte, en la concentración silenciosa antes del gesto perfecto."}},{"id":"velodrome","placeholder":true,"meta":{"fr":{"t":"Vélodrome","m":"Sérigraphie · 1975"},"en":{"t":"Velodrome","m":"Screen print · 1975"},"es":{"t":"Velódromo","m":"Serigrafía · 1975"}},"loc":{"fr":"Pavillon Liliane et David M. Stewart · niveau 2","en":"Liliane and David M. Stewart Pavilion · Level 2","es":"Pabellón Liliane et David M. Stewart · nivel 2"},"txt":{"fr":"Des courbes pures, une piste qui s'enroule sur elle-même : cette sérigraphie célèbre le vélodrome olympique de Montréal un an avant les Jeux. L'artiste réduit l'architecture à sa géométrie essentielle. Ce bâtiment existe toujours : vous le connaissez aujourd'hui sous le nom de Biodôme.","en":"Pure curves, a track coiling upon itself: this screen print celebrates Montreal's Olympic velodrome one year before the Games. The artist reduces the architecture to its essential geometry. The building still exists: you know it today as the Biodôme.","es":"Curvas puras, una pista que se enrolla sobre sí misma: esta serigrafía celebra el velódromo olímpico de Montreal un año antes de los Juegos. El artista reduce la arquitectura a su geometría esencial. El edificio todavía existe: hoy lo conoce como el Biodôme."}},{"id":"plongeon","placeholder":true,"meta":{"fr":{"t":"Le plongeon","m":"Aquarelle · 1932"},"en":{"t":"The Dive","m":"Watercolour · 1932"},"es":{"t":"El clavado","m":"Acuarela · 1932"}},"loc":{"fr":"Pavillon Michal et Renata Hornstein · niveau 2","en":"Michal and Renata Hornstein Pavilion · Level 2","es":"Pabellón Michal et Renata Hornstein · nivel 2"},"txt":{"fr":"Un corps en arc au-dessus de l'eau, peint en quelques touches transparentes. L'aquarelle, technique de l'instant, épouse parfaitement son sujet : un plongeon ne dure qu'une seconde, et cette peinture semble avoir été faite dans le même temps. L'eau n'est même pas représentée : elle est suggérée par le vide.","en":"A body arcing above the water, painted in a few transparent strokes. Watercolour, the medium of the instant, perfectly matches its subject: a dive lasts only a second, and this painting seems to have been made in the same span. The water itself is not even depicted: it is suggested by emptiness.","es":"Un cuerpo en arco sobre el agua, pintado en pocas pinceladas transparentes. La acuarela, técnica del instante, se ajusta perfectamente a su tema: un clavado dura solo un segundo, y esta pintura parece hecha en ese mismo tiempo. El agua ni siquiera está representada: la sugiere el vacío."}},{"id":"hockey","placeholder":true,"meta":{"fr":{"t":"Hockey de ruelle","m":"Huile sur panneau · 1958"},"en":{"t":"Alley Hockey","m":"Oil on panel · 1958"},"es":{"t":"Hockey de callejón","m":"Óleo sobre tabla · 1958"}},"loc":{"fr":"Pavillon Claire et Marc Bourgie · niveau 2","en":"Claire and Marc Bourgie Pavilion · Level 2","es":"Pabellón Claire et Marc Bourgie · nivel 2"},"txt":{"fr":"Pas de patinoire, pas d'uniformes : une ruelle enneigée, des bâtons dépareillés et la passion pure. Cette scène raconte le hockey comme les Montréalais l'ont vraiment vécu, entre les escaliers en colimaçon et les cordes à linge. Le but ? Deux bancs de neige. La coupe Stanley ? Dans la tête de chaque enfant.","en":"No rink, no uniforms: a snowy alley, mismatched sticks, and pure passion. This scene tells hockey as Montrealers truly lived it, between spiral staircases and clotheslines. The goal? Two snowbanks. The Stanley Cup? In every child's head.","es":"Sin pista, sin uniformes: un callejón nevado, palos desparejos y pasión pura. Esta escena cuenta el hockey como los montrealeses realmente lo vivieron, entre escaleras de caracol y cuerdas de ropa. ¿La portería? Dos bancos de nieve. ¿La copa Stanley? En la cabeza de cada niño."}}],"torlonia":[{"id":"introduction","intro":true,"meta":{"fr":{"t":"Bienvenue à l'exposition","m":"Contexte et repères avant de commencer"},"en":{"t":"Welcome to the Exhibition","m":"Context and background before you begin"},"es":{"t":"Bienvenida a la exposición","m":"Contexto antes de empezar"}},"txt":{"fr":"Bienvenue. Ce que vous allez découvrir a failli ne jamais être vu. Au dix-neuvième siècle, le prince Alessandro Torlonia a réuni l'une des plus grandes collections privées de sculpture antique jamais constituées : plus de six cents œuvres grecques et romaines, rivalisant avec les collections du Vatican. Il ouvre à Rome un musée privé pour les exposer. Puis, autour de la Seconde Guerre mondiale, ce musée ferme ses portes, et la collection disparaît presque entièrement. Pendant plus de soixante-dix ans, les chercheurs savent que ces chefs-d'œuvre existent, mais presque personne ne peut les voir. Tout change en 2020, lorsqu'une partie de la collection retrouve enfin le regard du public, à Rome. Depuis, elle a voyagé jusqu'au Louvre à Paris, jusqu'à Chicago et Fort Worth, et arrive maintenant à Montréal — sa dernière étape avant de rentrer en Italie. Ce parcours suit le cheminement de l'exposition elle-même, œuvre après œuvre. Beaucoup de pièces ont été restaurées à la main au fil des siècles, parfois par des sculpteurs célèbres complétant ce que le temps avait brisé. Plus loin, cherchez les deux visages devenus l'emblème de toute la collection. Quand vous serez prêt, appuyez sur lecture, et laissez-vous guider.","en":"Welcome. What you are about to see almost never happened. In the nineteenth century, Prince Alessandro Torlonia assembled one of the largest private collections of ancient sculpture ever formed: more than six hundred Greek and Roman works, rivalling the holdings of the Vatican. He opened a private museum in Rome to display them. Then, around the Second World War, that museum closed, and the collection all but vanished. For more than seventy years, scholars knew these masterpieces existed, but almost no one could see them. That changed in 2020, when part of the collection finally returned to public view in Rome. Since then it has travelled to the Louvre in Paris, to Chicago and Fort Worth, and now to Montreal — its final stop before returning home to Italy. This tour follows the exhibition's own path, work by work. Many pieces were restored by hand across the centuries, sometimes by famous sculptors completing what time had broken. Further along, look for the two faces that became the emblem of the whole collection. Whenever you are ready, press play, and start walking.","es":"Bienvenido. Lo que está a punto de ver casi nunca llegó a verse. En el siglo diecinueve, el príncipe Alessandro Torlonia reunió una de las mayores colecciones privadas de escultura antigua jamás formadas: más de seiscientas obras griegas y romanas, capaces de rivalizar con las del Vaticano. Abrió en Roma un museo privado para exhibirlas. Luego, hacia la Segunda Guerra Mundial, ese museo cerró sus puertas, y la colección prácticamente desapareció. Durante más de setenta años, los especialistas sabían que esas obras maestras existían, pero casi nadie podía verlas. Todo cambió en 2020, cuando parte de la colección volvió por fin a mostrarse al público, en Roma. Desde entonces ha viajado hasta el Louvre en París, hasta Chicago y Fort Worth, y llega ahora a Montreal — su última parada antes de regresar a Italia. Este recorrido sigue el propio camino de la exposición, obra por obra. Muchas piezas fueron restauradas a mano a lo largo de los siglos, a veces por escultores célebres que completaron lo que el tiempo había roto. Más adelante, busque los dos rostros que se convirtieron en el emblema de toda la colección. Cuando esté listo, presione reproducir, y déjese guiar."}},{"id":"leda-swan-giustiniani","meta":{"fr":{"t":"Léda et le cygne","m":"1re moitié du 2e s. · Collection Giustiniani"},"en":{"t":"Leda and the Swan","m":"First half of 2nd c. · Giustiniani Collection"},"es":{"t":"Leda y el cisne","m":"1.ª mitad del s. II · Colección Giustiniani"}},"txt":{"fr":"Zeus, épris de la reine Léda, se transforme en cygne pour l'approcher : c'est l'un des mythes de séduction les plus représentés de l'Antiquité, et les Romains en firent une version fondée sur un modèle grec plus ancien, reproduite par des ateliers entiers à partir de gabarits et de mesures standardisées, un peu comme une chaîne de production du beau. Ce marbre fut découvert en 1623 sur la Piazza di Mario, juste au sud de Velletri, avant d'entrer dans la collection du cardinal Giustiniani. Vous croiserez une seconde Léda plus loin dans le parcours : une bonne occasion de comparer deux interprétations d'un même sujet, à un siècle d'écart.","en":"Zeus, smitten with Queen Leda, turns himself into a swan to approach her — one of antiquity's most popular seduction myths. The Romans based their version on an older Greek model and mass-produced it using workshop patterns and standardized measurements, not unlike an assembly line for beauty. This marble surfaced in 1623 in the Piazza di Mario, just south of Velletri, before entering Cardinal Giustiniani's collection. You'll meet a second Leda later in the tour — a good chance to compare two takes on the same subject, a century apart.","es":"Zeus, prendado de la reina Leda, se transforma en cisne para acercarse a ella: uno de los mitos de seducción más representados de la Antigüedad. Los romanos basaron su versión en un modelo griego más antiguo y la reprodujeron en serie con plantillas y medidas estandarizadas de taller, casi como una cadena de producción de la belleza. Este mármol apareció en 1623 en la Piazza di Mario, justo al sur de Velletri, antes de entrar en la colección del cardenal Giustiniani. Más adelante en el recorrido encontrará una segunda Leda: una buena ocasión para comparar dos versiones del mismo tema, con un siglo de diferencia."}},{"id":"gaius-marcius","meta":{"fr":{"t":"Monument funéraire de Gaius Marcius Crescens","m":"2e s. · Trouvé à Porto (Portus)"},"en":{"t":"Funerary Monument of Gaius Marcius Crescens","m":"2nd c. · Found in Porto (Portus)"},"es":{"t":"Monumento funerario de Gaius Marcius Crescens","m":"s. II · Hallado en Porto (Portus)"}},"txt":{"fr":"L'inscription sous ce portrait précise que le garçon est mort à quatorze ans et neuf heures. Pas quatorze ans : quatorze ans et neuf heures. Cette précision presque insoutenable en dit plus sur le chagrin de ses parents que n'importe quelle épitaphe élaborée. La mortalité infantile était omniprésente dans l'Antiquité, et les familles qui en avaient les moyens élevaient des monuments comme celui-ci, puis revenaient s'y recueillir à l'anniversaire de l'enfant ou lors des fêtes rituelles dédiées aux morts. Ce marbre n'est pas un simple portrait : c'est un lieu de mémoire qu'une famille romaine a visité, année après année.","en":"The inscription beneath this portrait notes that the boy died at fourteen years and nine hours. Not fourteen years: fourteen years and nine hours. That almost unbearable precision says more about his parents' grief than any elaborate epitaph could. Child mortality was a constant presence in antiquity, and families who could afford it raised monuments like this one, then returned to it on the boy's birthday and on ritual feast days for the dead. This marble isn't just a portrait — it's a place a Roman family kept coming back to, year after year.","es":"La inscripción bajo este retrato precisa que el niño murió a los catorce años y nueve horas. No catorce años: catorce años y nueve horas. Esa precisión casi insoportable dice más sobre el duelo de sus padres que cualquier epitafio elaborado. La mortalidad infantil era una presencia constante en la Antigüedad, y las familias con recursos levantaban monumentos como este para volver a visitarlo en el cumpleaños del niño o en las fiestas rituales dedicadas a los muertos. Este mármol no es solo un retrato: es un lugar al que una familia romana regresó, año tras año."}},{"id":"medusa-trapezophoroi","meta":{"fr":{"t":"Deux pieds de table à tête de Méduse","m":"2e s. · Collection Giustiniani"},"en":{"t":"Two Medusa Table Legs","m":"2nd c. · Giustiniani Collection"},"es":{"t":"Dos patas de mesa con cabeza de Medusa","m":"s. II · Colección Giustiniani"}},"txt":{"fr":"Deux têtes de Méduse, l'une couronnant un griffon, l'autre un lion, ornaient les pieds d'une même table romaine de luxe : un trapézophore. Le type est dit Rondanini, du nom d'un modèle célèbre : après Persée, la Gorgone n'est plus montrée comme un monstre grimaçant mais comme un visage étrangement serein aux yeux mi-clos, une beauté figée par sa propre mort. Remarquez que les deux têtes ne sont pas parfaitement identiques : l'une est une pièce ancienne, l'autre une réplique fabriquée plus tard pour compléter la paire, à une époque où les collectionneurs préféraient un ensemble complet à deux moitiés dépareillées.","en":"Two heads of Medusa, one crowning a griffin, the other a lion, once decorated the legs of the same luxury Roman table — a trapezophoros. The type is called Rondanini, after a famous model: after Perseus's blow, the Gorgon is no longer shown as a snarling monster but as a strangely serene face with half-closed eyes, beauty frozen by its own death. Look closely and the two heads aren't quite identical — one is ancient, the other a later replica made to complete the pair, from an era when collectors preferred a matching set over two mismatched halves.","es":"Dos cabezas de Medusa, una coronando un grifo y la otra un león, decoraban las patas de una misma mesa romana de lujo: un trapezóforo. El tipo se llama Rondanini, por un modelo célebre: tras el golpe de Perseo, la Gorgona ya no se representa como un monstruo que gruñe, sino como un rostro extrañamente sereno de ojos entornados, una belleza congelada por su propia muerte. Fíjese en que las dos cabezas no son idénticas: una es antigua, la otra una réplica fabricada después para completar el par, en una época en que los coleccionistas preferían un conjunto completo a dos mitades desparejadas."}},{"id":"germanicus","meta":{"fr":{"t":"Statue de Germanicus","m":"1er s. · Bronze · Fouilles Torlonia de 1874"},"en":{"t":"Statue of Germanicus","m":"1st c. · Bronze · 1874 Torlonia excavation"},"es":{"t":"Estatua de Germánico","m":"s. I · Bronce · Excavación Torlonia de 1874"}},"txt":{"fr":"Sur plus de six cents sculptures que compte la collection Torlonia, une seule est en bronze : celle-ci. Le bronze romain a presque entièrement disparu parce qu'il valait cher et se refondait facilement — armes, pièces de monnaie, cloches d'église ont recyclé des milliers de statues antiques au fil des siècles. Celle-ci n'a survécu que parce qu'elle est restée enfouie, oubliée, jusqu'à sa découverte en 1874 sur le domaine Torlonia de Sabine, l'antique Cures. Le buste et la jambe fléchie sont authentiquement anciens ; la tête, les bras et le drapé du socle sont des restaurations, tenus ensemble par une armature de fer complexe cachée à l'intérieur. Le visage pourrait être celui de Germanicus, général romain et frère de l'empereur Claude.","en":"Of more than six hundred sculptures in the Torlonia Collection, exactly one is bronze — this one. Roman bronze has almost entirely vanished because the metal was valuable and endlessly recyclable: weapons, coins, and church bells melted down thousands of ancient statues over the centuries. This one survived only because it stayed buried and forgotten until its discovery in 1874 on the Torlonia estate in the Sabine hills, ancient Cures. The torso and bent leg are genuinely ancient; the head, arms, and draped base are restorations, held together by a hidden iron framework inside. The face may belong to Germanicus, a Roman general and brother of the emperor Claudius.","es":"De más de seiscientas esculturas que reúne la colección Torlonia, exactamente una es de bronce: esta. El bronce romano casi ha desaparecido por completo porque el metal era valioso y se podía refundir sin fin: armas, monedas, campanas de iglesia reciclaron miles de estatuas antiguas a lo largo de los siglos. Esta sobrevivió solo porque quedó enterrada y olvidada hasta su descubrimiento en 1874 en la finca Torlonia de la Sabina, la antigua Cures. El torso y la pierna flexionada son auténticamente antiguos; la cabeza, los brazos y el drapeado de la base son restauraciones, sostenidas por una armadura de hierro oculta en su interior. El rostro podría pertenecer a Germánico, general romano y hermano del emperador Claudio."}},{"id":"leda-swan-portus","meta":{"fr":{"t":"Léda et le cygne (seconde version)","m":"Fin du 2e s. · Fouilles Torlonia de 1864 à Portus"},"en":{"t":"Leda and the Swan (second version)","m":"Late 2nd c. · 1864 Torlonia excavation at Portus"},"es":{"t":"Leda y el cisne (segunda versión)","m":"Fines del s. II · Excavación Torlonia de 1864 en Portus"}},"txt":{"fr":"Voici la seconde Léda du parcours, sculptée près d'un demi-siècle après la première que vous avez peut-être déjà croisée. Même mythe, même geste de la reine accueillant le cygne, mais un marbre différent — pentélique celui-ci — et une découverte bien documentée : elle fut mise au jour en 1864 lors des fouilles Torlonia du Palazzo Imperiale, au cœur de l'ancien port de Portus. Comparer les deux versions révèle à quel point un même sujet pouvait être décliné, chaque atelier romain interprétant légèrement la pose, le drapé ou l'expression selon la commande.","en":"Here's the tour's second Leda, carved nearly half a century after the first one you may already have passed. Same myth, same gesture of the queen welcoming the swan, but a different marble this time — Pentelic — and a well-documented find: it surfaced in 1864 during the Torlonia excavations of the Palazzo Imperiale, in the heart of ancient Portus. Comparing the two versions shows how freely a single subject could be reworked, each Roman workshop tweaking the pose, drapery, or expression to suit the commission.","es":"Esta es la segunda Leda del recorrido, esculpida casi medio siglo después de la primera que quizás ya vio. Mismo mito, mismo gesto de la reina acogiendo al cisne, pero un mármol distinto —pentélico esta vez— y un hallazgo bien documentado: salió a la luz en 1864 durante las excavaciones Torlonia del Palazzo Imperiale, en el corazón del antiguo puerto de Portus. Comparar ambas versiones muestra cuánto podía reinterpretarse un mismo tema: cada taller romano ajustaba ligeramente la pose, el drapeado o la expresión según el encargo."}},{"id":"hercules-sarcophagus-thasian","meta":{"fr":{"t":"Sarcophage aux travaux d'Hercule","m":"V. 160-170 · Marbre de Thasos · Via Latina"},"en":{"t":"Sarcophagus with the Labours of Hercules","m":"About 160–170 · Thasian marble · Via Latina"},"es":{"t":"Sarcófago con los trabajos de Hércules","m":"H. 160-170 · Mármol de Tasos · Vía Latina"}},"txt":{"fr":"Hercule affronte tour à tour le lion de Némée, l'hydre, le sanglier : ses douze travaux couvrent ce sarcophage massif comme une bande dessinée antique. Pourquoi choisir ce héros pour un tombeau ? Parce qu'Hercule est le mythe romain de la souffrance surmontée : après une vie d'épreuves, il gagne l'immortalité parmi les dieux. Pour une famille en deuil, c'était un espoir sculpté dans la pierre — et pour les vivants qui payaient, un marqueur de statut social assumé, taillé dans un marbre de Thasos importé à grands frais depuis une île grecque de la mer Égée.","en":"Hercules battles the Nemean lion, the hydra, the boar, one after another: his twelve labours wrap around this massive sarcophagus like an ancient comic strip. Why choose this hero for a tomb? Because Hercules is Rome's myth of suffering overcome — after a lifetime of trials, he wins immortality among the gods. For a grieving family, that was hope carved into stone. For the living who paid for it, it was also an unmistakable status marker, cut from Thasian marble imported at great expense from a Greek island in the Aegean Sea.","es":"Hércules se enfrenta, uno tras otro, al león de Nemea, la hidra, el jabalí: sus doce trabajos envuelven este sarcófago masivo como un cómic de la Antigüedad. ¿Por qué elegir a este héroe para una tumba? Porque Hércules es el mito romano del sufrimiento superado: tras una vida de pruebas, gana la inmortalidad entre los dioses. Para una familia de luto, era una esperanza tallada en piedra; y para quienes pagaban el encargo, un marcador de estatus social sin disimulo, labrado en mármol de Tasos importado a gran costo desde una isla griega del mar Egeo."}},{"id":"resting-goat-bernini","meta":{"fr":{"t":"Bouc au repos, tête attribuée au Bernin","m":"Corps : fin 1er s. · Tête : v. 1620 · Collection Giustiniani"},"en":{"t":"Resting Goat, head attributed to Bernini","m":"Body: late 1st c. · Head: c. 1620 · Giustiniani Collection"},"es":{"t":"Cabra en reposo, cabeza atribuida a Bernini","m":"Cuerpo: fines s. I · Cabeza: h. 1620 · Colección Giustiniani"}},"txt":{"fr":"Cette sculpture réunit deux artistes séparés par presque seize siècles. Le corps antique du bouc, sans tête, appartient à l'époque de Trajan. Vers 1620, le marquis Vincenzo Giustiniani confie sa restauration à un sculpteur encore inconnu : le jeune Gian Lorenzo Bernini, tout juste vingt ans, qui deviendra le plus grand génie du baroque romain. Bernini invente une tête entière, couverte de boucles vivantes, avant même d'avoir sculpté la moindre œuvre qui le rendra célèbre. Les Torlonia n'ont pas commandé cette restauration : ils ont hérité de la collection Giustiniani presque deux siècles plus tard, en réglant une dette de famille — un bouc en marbre comme note de crédit.","en":"This sculpture brings together two artists separated by nearly sixteen centuries. The goat's headless ancient body belongs to the age of Trajan. Around 1620, the marquis Vincenzo Giustiniani handed its restoration to a still-unknown sculptor: the twenty-year-old Gian Lorenzo Bernini, decades before he became the towering genius of Roman Baroque. Bernini invented an entire head, covered in lively curls, before he had carved a single work that would make him famous. The Torlonias never commissioned this restoration — they inherited the whole Giustiniani collection almost two centuries later, settling a family debt with it. A marble goat, as a receipt.","es":"Esta escultura reúne a dos artistas separados por casi dieciséis siglos. El cuerpo antiguo de la cabra, sin cabeza, pertenece a la época de Trajano. Hacia 1620, el marqués Vincenzo Giustiniani encarga su restauración a un escultor todavía desconocido: el joven Gian Lorenzo Bernini, de apenas veinte años, que llegaría a ser el gran genio del barroco romano. Bernini inventa una cabeza completa, cubierta de rizos vivos, antes incluso de haber esculpido la obra que lo haría famoso. Los Torlonia no encargaron esta restauración: heredaron toda la colección Giustiniani casi dos siglos después, al saldar una deuda familiar. Una cabra de mármol, a modo de recibo."}},{"id":"husband-wife","meta":{"fr":{"t":"Mari et femme","m":"2e s. · Marbre de Luni · Collection Giustiniani"},"en":{"t":"Husband and Wife","m":"2nd c. · Luna marble · Giustiniani Collection"},"es":{"t":"Marido y mujer","m":"s. II · Mármol de Luna · Colección Giustiniani"}},"txt":{"fr":"Regardez leurs mains droites, jointes au centre du groupe. Ce geste a un nom en latin, la dextrarum iunctio, et il résume tout : c'est le symbole romain de la fidélité conjugale et de l'harmonie du couple, aussi reconnaissable pour un Romain que l'alliance l'est pour nous. Ce portrait double, probablement funéraire, ne cherche pas la ressemblance individuelle autant que l'idéal du couple uni jusque dans la mort. Des milliers de sarcophages et de reliefs romains reprennent ce même geste : une poignée de main devenue promesse éternelle.","en":"Look at their right hands, joined at the centre of the group. That gesture has a Latin name, dextrarum iunctio, and it says everything: it's the Roman symbol of marital fidelity and harmony, as instantly recognizable to a Roman as a wedding ring is to us. This double portrait, likely funerary, cares less about individual likeness than about the ideal of a couple united even in death. Thousands of Roman sarcophagi and reliefs repeat the same gesture — a handshake turned into an eternal promise.","es":"Mire sus manos derechas, unidas en el centro del grupo. Ese gesto tiene nombre en latín, dextrarum iunctio, y lo resume todo: es el símbolo romano de la fidelidad conyugal y la armonía de la pareja, tan reconocible para un romano como lo es hoy un anillo de bodas. Este retrato doble, probablemente funerario, no busca tanto el parecido individual como el ideal de una pareja unida incluso más allá de la muerte. Miles de sarcófagos y relieves romanos repiten el mismo gesto: un apretón de manos convertido en promesa eterna."}},{"id":"strigilated-sarcophagus-lions","meta":{"fr":{"t":"Sarcophage à strigiles aux lions","m":"V. 260-270 · Marbre grec · Palazzo Savelli"},"en":{"t":"Strigilated Sarcophagus with Lions","m":"About 260–270 · Greek marble · Palazzo Savelli"},"es":{"t":"Sarcófago estriado con leones","m":"H. 260-270 · Mármol griego · Palazzo Savelli"}},"txt":{"fr":"Les cannelures ondulées qui couvrent ce sarcophage imitent la strigile, un racloir que les athlètes romains utilisaient pour ôter l'huile et la poussière de leur peau après l'exercice — un motif décoratif à la mode, rapide à tailler, qui laissait toute la place aux scènes figurées sur les côtés. Ici, des lions dominent un dompteur : une image qui pourrait renvoyer aux jeux du cirque et suggérer que le défunt, ou sa famille, avait un lien avec ces spectacles. Assemblé à partir de plusieurs fragments et abondamment restauré au fil des siècles, ce monument porte les traces visibles de sa propre survie.","en":"The rippling grooves covering this sarcophagus imitate the strigil, a scraper Roman athletes used to remove oil and dust from their skin after exercise — a fashionable, quick-to-carve decorative motif that left the figured scenes on the sides to do the storytelling. Here, lions overpower a tamer: an image that may point to the arena games and suggest the deceased, or their family, had some connection to them. Assembled from several fragments and heavily restored over the centuries, this monument still carries the visible marks of its own survival.","es":"Las ondulaciones que cubren este sarcófago imitan la estrígile, un raspador que los atletas romanos usaban para quitarse el aceite y el polvo de la piel después de hacer ejercicio: un motivo decorativo de moda, rápido de tallar, que dejaba todo el protagonismo a las escenas figuradas de los laterales. Aquí, unos leones dominan a un domador: una imagen que podría remitir a los juegos del circo y sugerir que el difunto, o su familia, tenía algún vínculo con ellos. Ensamblado a partir de varios fragmentos y ampliamente restaurado a lo largo de los siglos, este monumento conserva las huellas visibles de su propia supervivencia."}},{"id":"attic-votive-relief","meta":{"fr":{"t":"Relief votif attique","m":"Fin du 5e s. av. n. è. · Marbre pentélique"},"en":{"t":"Attic Votive Relief","m":"Late 5th c. BCE · Pentelic marble"},"es":{"t":"Relieve votivo ático","m":"Fines del s. V a.e.c. · Mármol pentélico"}},"txt":{"fr":"Presque toutes les sculptures grecques présentées ici sont en réalité des copies romaines. Celle-ci ne l'est pas : c'est un original grec, sculpté dans l'Athènes classique, peut-être destiné à l'Acropole elle-même. Quand ce relief est arrivé à Rome, probablement au 2e siècle, il était déjà vieux de quatre à cinq cents ans — l'équivalent, pour un collectionneur romain, d'un objet Renaissance pour nous aujourd'hui. Posséder un original grec authentique, et non une copie, affichait une richesse et un raffinement que peu de familles romaines pouvaient se permettre.","en":"Almost every Greek-looking sculpture in this show is actually a Roman copy. This one isn't: it's a genuine Greek original, carved in Classical Athens, perhaps intended for the Acropolis itself. By the time it reached Rome, likely in the 2nd century, it was already four or five hundred years old — for a Roman collector, roughly what a Renaissance object is to us today. Owning an authentic Greek original, not a copy, signalled a wealth and refinement few Roman families could afford.","es":"Casi todas las esculturas de aspecto griego que ha visto hasta ahora son en realidad copias romanas. Esta no lo es: es un original griego auténtico, esculpido en la Atenas clásica, quizás destinado a la propia Acrópolis. Cuando este relieve llegó a Roma, probablemente en el siglo II, ya tenía cuatrocientos o quinientos años de antigüedad —lo que, para un coleccionista romano, equivaldría hoy a un objeto renacentista para nosotros. Poseer un original griego auténtico, y no una copia, era una muestra de riqueza y refinamiento que pocas familias romanas podían permitirse."}},{"id":"trajans-women","meta":{"fr":{"t":"Les femmes de Trajan","m":"Section thématique · Portraits impériaux romains"},"en":{"t":"Trajan's Women","m":"Thematic section · Roman imperial portraiture"},"es":{"t":"Las mujeres de Trajano","m":"Sección temática · Retratos imperiales romanos"}},"txt":{"fr":"Autour de vous, plusieurs visages de femmes liées à l'empereur Trajan : Marciana sa sœur, Plotina son épouse, Matidia sa nièce. Aucune d'elles n'a régné, mais leurs portraits officiels circulaient dans tout l'Empire, sur des sculptures comme sur des monnaies, pour asseoir la légitimité et la continuité de la famille impériale. Une coiffure particulière, une posture, un titre gravé suffisaient à transformer une parente en incarnation publique des vertus féminines romaines : piété, dignité, fidélité. Prenez le temps de comparer ces visages : de subtiles variations de style trahissent des ateliers, des générations, parfois des messages politiques différents.","en":"Around you are several women connected to the emperor Trajan: his sister Marciana, his wife Plotina, his niece Matidia. None of them ruled, yet their official portraits circulated across the Empire, on sculpture and on coins alike, to project the legitimacy and continuity of the imperial family. A particular hairstyle, a posture, an inscribed title was enough to turn a relative into a public embodiment of Roman feminine virtue: piety, dignity, fidelity. Take a moment to compare these faces — subtle stylistic differences betray different workshops, generations, and sometimes different political messages.","es":"A su alrededor hay varios rostros de mujeres vinculadas al emperador Trajano: su hermana Marciana, su esposa Plotina, su sobrina Matidia. Ninguna gobernó, pero sus retratos oficiales circulaban por todo el Imperio, tanto en esculturas como en monedas, para reforzar la legitimidad y la continuidad de la familia imperial. Un peinado particular, una postura, un título grabado bastaban para convertir a una pariente en encarnación pública de las virtudes femeninas romanas: piedad, dignidad, fidelidad. Tómese un momento para comparar estos rostros: sutiles variaciones de estilo delatan talleres, generaciones y, a veces, mensajes políticos distintos."}},{"id":"ensuring-continuity","meta":{"fr":{"t":"Assurer la continuité","m":"Section thématique · Portraits impériaux romains"},"en":{"t":"Ensuring Continuity","m":"Thematic section · Roman imperial portraiture"},"es":{"t":"Asegurar la continuidad","m":"Sección temática · Retratos imperiales romanos"}},"txt":{"fr":"Marc Aurèle et Lucius Verus ont gouverné Rome ensemble, une expérience rare de pouvoir partagé. Pour la consolider, des alliances matrimoniales ont scellé les deux branches de la famille impériale, portées ici par deux femmes : Faustine la Jeune et Lucilla. Leurs portraits jouent un jeu d'équilibriste : assez proches l'un de l'autre pour affirmer un air de famille rassurant, assez distincts pour que chacune incarne son propre idéal de féminité impériale. Rien n'était laissé au hasard dans ces visages : chaque détail servait la légitimité du pouvoir.","en":"Marcus Aurelius and Lucius Verus ruled Rome together, a rare experiment in shared power. To cement it, marriage alliances bound the two branches of the imperial family, embodied here by two women: Faustina the Younger and Lucilla. Their portraits perform a careful balancing act — close enough to project a reassuring family resemblance, distinct enough that each embodies her own ideal of imperial femininity. Nothing in these faces was left to chance; every detail served the legitimacy of power.","es":"Marco Aurelio y Lucio Vero gobernaron Roma juntos, un experimento poco común de poder compartido. Para consolidarlo, alianzas matrimoniales unieron las dos ramas de la familia imperial, encarnadas aquí por dos mujeres: Faustina la Menor y Lucila. Sus retratos hacen un ejercicio de equilibrio: lo bastante parecidos entre sí como para proyectar un aire de familia tranquilizador, lo bastante distintos como para que cada una encarne su propio ideal de feminidad imperial. Nada en estos rostros quedaba al azar: cada detalle servía a la legitimidad del poder."}},{"id":"girl-with-bird","meta":{"fr":{"t":"Fillette tenant un oiseau","m":"1re moitié du 2e s. · Via Latina, Rome"},"en":{"t":"Girl Holding a Bird","m":"First half of 2nd c. · Via Latina, Rome"},"es":{"t":"Niña con un pájaro","m":"1.ª mitad del s. II · Vía Latina, Roma"}},"txt":{"fr":"Pendant longtemps, on a cru voir ici un jeune garçon nourrissant un oiseau. Un examen plus attentif a révélé un trou d'oreille percé pour une boucle : c'est une fillette. Le motif de l'enfant et de l'oiseau évoque un thème grec ancien associé à la pureté et à l'affection, que le poète romain Catulle a rendu célèbre en comparant les caresses d'un amant à celles qu'on offre à un moineau apprivoisé. Une simple erreur d'identification, corrigée des siècles plus tard, change complètement la lecture de cette scène tendre.","en":"For a long time, this was read as a young boy feeding a bird. Closer examination revealed a pierced earring hole: it's a girl. The motif of a child with a bird draws on an old Greek theme linked to purity and affection, one the Roman poet Catullus made famous by comparing a lover's caresses to those given to a tame sparrow. A simple misidentification, corrected centuries later, completely changes how we read this tender little scene.","es":"Durante mucho tiempo se interpretó como un niño alimentando a un pájaro. Un examen más atento reveló un agujero de pendiente en la oreja: es una niña. El motivo del niño con un ave remite a un tema griego antiguo asociado con la pureza y el afecto, que el poeta romano Catulo hizo célebre al comparar las caricias de un amante con las que se le dan a un gorrión domesticado. Un simple error de identificación, corregido siglos después, cambia por completo la lectura de esta escena tan tierna."}},{"id":"hercules-sarcophagus-asiatic","meta":{"fr":{"t":"Sarcophage aux travaux d'Hercule, avec couvercle","m":"2e moitié du 2e s. · Marbre d'Asie · Palazzo Savelli"},"en":{"t":"Sarcophagus with the Labours of Hercules and Lid","m":"2nd half of 2nd c. · Asiatic marble · Palazzo Savelli"},"es":{"t":"Sarcófago con los trabajos de Hércules, con tapa","m":"2.ª mitad del s. II · Mármol asiático · Palazzo Savelli"}},"txt":{"fr":"Un second sarcophage d'Hercule dans ce même parcours : preuve que ce héros triomphant était un choix funéraire particulièrement recherché par les familles romaines aisées. Mais regardez le couvercle : un couple y est allongé comme à un banquet, dans la pose exacte qu'ils auraient adoptée pour un dîner de leur vivant. En dessous, les travaux d'Hercule ; au-dessus, l'éternité imaginée comme un repas sans fin entre égaux. Ce monument massif, importé d'Asie Mineure à prix d'or, n'était pas seulement un tombeau : c'était la dernière déclaration publique du statut social d'une famille.","en":"A second Hercules sarcophagus on this same tour — proof that the triumphant hero was a particularly sought-after choice for wealthy Roman families laying loved ones to rest. But look at the lid: a couple reclines there as if at a banquet, in the exact pose they'd have struck at a dinner party in life. Below, Hercules's labours; above, eternity imagined as an endless meal among equals. This massive monument, imported from Asia Minor at enormous cost, wasn't just a tomb — it was a family's final public statement of status.","es":"Un segundo sarcófago de Hércules en este mismo recorrido: prueba de que el héroe triunfante era una elección funeraria especialmente buscada por las familias romanas acomodadas. Pero mire la tapa: una pareja está recostada como en un banquete, en la misma pose que habrían adoptado en una cena en vida. Abajo, los trabajos de Hércules; arriba, la eternidad imaginada como una comida sin fin entre iguales. Este monumento macizo, importado desde Asia Menor a precio de oro, no era solo una tumba: era la última declaración pública del estatus social de una familia."}},{"id":"apollo-citharoedus","meta":{"fr":{"t":"Apollon citharède","m":"2e s. · Peut-être trouvé à Ostie"},"en":{"t":"Apollo Citharoedus","m":"2nd c. · Possibly found in Ostia"},"es":{"t":"Apolo citaredo","m":"s. II · Posiblemente hallado en Ostia"}},"txt":{"fr":"Apollon, dieu de la musique, de la poésie et de la prophétie, est ici saisi comme en pleine performance, une lyre à la main : le type dit citharède, associé aux théâtres antiques où sa statue pouvait présider aux concours de chant. Le modèle s'inspire du style Sévère grec, austère et frontal, remis au goût du jour des siècles plus tard. Une anecdote de restauration mérite le détour : au 19e siècle, un restaurateur a délibérément rapproché ce marbre de l'Apollon du Belvédère, alors la statue la plus admirée d'Europe, conservée aux Musées du Vatican — preuve que même l'Antiquité s'est parfois copiée elle-même.","en":"Apollo, god of music, poetry, and prophecy, is caught here mid-performance, lyre in hand: the so-called citharoedus type, linked to ancient theatres where his statue might preside over singing contests. The model draws on the austere, frontal Greek Severe Style, revived centuries later. One restoration detail is worth lingering on: in the 19th century, a restorer deliberately reworked this marble to echo the Apollo Belvedere, then the most admired statue in Europe, held in the Vatican Museums — proof that even antiquity sometimes copied itself.","es":"Apolo, dios de la música, la poesía y la profecía, aparece aquí a mitad de una interpretación, lira en mano: el llamado tipo citaredo, vinculado a los teatros antiguos donde su estatua podía presidir concursos de canto. El modelo se inspira en el austero y frontal estilo Severo griego, retomado siglos después. Vale la pena detenerse en un dato de restauración: en el siglo XIX, un restaurador acercó deliberadamente este mármol al Apolo de Belvedere, entonces la estatua más admirada de Europa, conservada en los Museos Vaticanos — prueba de que hasta la Antigüedad a veces se copiaba a sí misma."}},{"id":"aphrodite-eros-ketos","meta":{"fr":{"t":"Aphrodite avec Éros et un monstre marin","m":"1re moitié du 2e s. · Collection Giustiniani"},"en":{"t":"Aphrodite with Eros and a Sea Monster","m":"First half of 2nd c. · Giustiniani Collection"},"es":{"t":"Afrodita con Eros y un monstruo marino","m":"1.ª mitad del s. II · Colección Giustiniani"}},"txt":{"fr":"Aphrodite se tient avec grâce, un Éros facétieux à ses côtés, tandis qu'un ketos — un monstre marin serpentin — s'enroule à ses pieds. Ce type de groupe théâtral, inspiré des inventions grecques de l'époque hellénistique, était particulièrement prisé pour orner les thermes et les espaces publics romains, où l'eau, la mythologie marine et la nudité divine formaient un decorum parfaitement assumé. Rien ici n'est austère : c'est un art pensé pour le plaisir des yeux autant que pour la piété.","en":"Aphrodite stands with grace, a mischievous Eros beside her, while a ketos — a serpentine sea monster — coils at her feet. This kind of theatrical group, inspired by Hellenistic Greek inventions, was especially popular for decorating Roman baths and public spaces, where water, marine mythology, and divine nudity formed a perfectly acceptable decorum. Nothing austere here — this is art made for the pleasure of the eye as much as for piety.","es":"Afrodita se yergue con gracia, con un Eros travieso a su lado, mientras un ketos —un monstruo marino serpentino— se enrosca a sus pies. Este tipo de grupo teatral, inspirado en invenciones griegas de época helenística, era especialmente apreciado para decorar termas y espacios públicos romanos, donde el agua, la mitología marina y la desnudez divina formaban un decoro perfectamente aceptado. Nada austero aquí: es un arte pensado tanto para el placer de la vista como para la piedad."}},{"id":"bacchus-on-ram","meta":{"fr":{"t":"Le jeune Bacchus chevauchant un bélier","m":"1er-2e s. · Peut-être trouvé sur la Via Appia"},"en":{"t":"Infant Bacchus Riding a Ram","m":"1st–2nd c. · Possibly found on the Via Appia"},"es":{"t":"El joven Baco cabalgando un carnero","m":"s. I-II · Posiblemente hallado en la Vía Apia"}},"txt":{"fr":"Un enfant potelé chevauche joyeusement un bélier : Bacchus, dieu du vin et de l'extase, montré ici dans son enfance plutôt que dans ses excès légendaires. Ce type de scène pastorale et enfantine, sans grand enjeu narratif, ornait volontiers jardins et villas romaines — un art domestique, presque décoratif, loin de la solennité des portraits impériaux. On y sent le plaisir simple de représenter l'innocence et le mouvement, sans autre message que la joie.","en":"A chubby child rides joyfully on a ram's back: Bacchus, god of wine and ecstasy, shown here in childhood rather than in his legendary excesses. This kind of light, pastoral, child-centred scene, with little narrative weight, was a favourite for decorating Roman gardens and villas — domestic, almost purely ornamental art, far from the solemnity of imperial portraits. There's a simple pleasure in it: capturing innocence and motion, with no message beyond delight.","es":"Un niño rechoncho cabalga alegremente sobre un carnero: Baco, dios del vino y el éxtasis, mostrado aquí en su infancia y no en sus legendarios excesos. Este tipo de escena pastoral e infantil, sin grandes pretensiones narrativas, solía decorar jardines y villas romanas: un arte doméstico, casi puramente ornamental, lejos de la solemnidad de los retratos imperiales. Se percibe el placer simple de representar la inocencia y el movimiento, sin más mensaje que la alegría."}},{"id":"emperor-throne-augustus","meta":{"fr":{"t":"Empereur en majesté, portrait d'Auguste","m":"1er s. · Peut-être trouvé à Boville"},"en":{"t":"Enthroned Emperor, Portrait of Augustus","m":"1st c. · Possibly found in Boville","es_unused":""},"es":{"t":"Emperador en majestad, retrato de Augusto","m":"s. I · Posiblemente hallado en Boville"}},"txt":{"fr":"Assis en majesté dans une pose qui rappelle les grandes images grecques de Zeus ou de Jupiter, cet empereur emprunte le langage visuel des dieux pour asseoir son autorité. La tête est une addition moderne qui a transformé la statue en portrait d'Auguste, premier empereur de Rome : une manière de rappeler que le pouvoir impérial se construisait aussi par association visuelle avec le divin. Le corps antique, en marbre pentélique, et les ajouts plus récents racontent ensemble une double histoire, celle de la Rome antique et celle des collectionneurs qui, des siècles plus tard, ont choisi de la compléter.","en":"Seated in majesty, in a pose echoing the great Greek images of Zeus or Jupiter, this emperor borrows the visual language of the gods to project his authority. The head is a later addition that turned the statue into a portrait of Augustus, Rome's first emperor — a reminder that imperial power was built partly through visual association with the divine. The ancient body, carved in Pentelic marble, and the more recent additions together tell a double story: one of ancient Rome, and one of the collectors who, centuries later, chose how to complete it.","es":"Sentado en majestad, en una pose que recuerda las grandes imágenes griegas de Zeus o Júpiter, este emperador toma prestado el lenguaje visual de los dioses para afirmar su autoridad. La cabeza es un añadido posterior que transformó la estatua en un retrato de Augusto, primer emperador de Roma: un recordatorio de que el poder imperial también se construía por asociación visual con lo divino. El cuerpo antiguo, en mármol pentélico, y los añadidos más recientes cuentan juntos una doble historia: la de la Roma antigua y la de los coleccionistas que, siglos después, decidieron cómo completarla."}},{"id":"amelung-athlete","meta":{"fr":{"t":"Jeune athlète, dit l'athlète Amelung","m":"Fin 1er-début 2e s. · Fouilles Torlonia de 1864 à Portus"},"en":{"t":"Youth, Known as the Amelung Athlete","m":"Late 1st–early 2nd c. · 1864 Torlonia excavation at Portus"},"es":{"t":"Joven, conocido como el atleta Amelung","m":"Fines s. I-inicios s. II · Excavación Torlonia de 1864 en Portus"}},"txt":{"fr":"Ce jeune homme semble en train de nouer une lanière de cuir autour de sa tête — un geste qui trahit un pratiquant de pancrace ou de boxe, se protégeant le crâne avant l'entraînement. Le pancrace combinait coups de poing, prises de lutte et coups de pied, avec presque aucune limite : seuls les yeux et les morsures étaient interdits. Ce type de statue d'athlète, souvent copié d'un modèle grec en bronze aujourd'hui perdu, ornait les gymnases romains, où l'exercice physique restait indissociable d'un idéal esthétique et moral hérité de la Grèce.","en":"This young man appears to be tying a leather strap around his head — a gesture that marks him as a pankration fighter or boxer, protecting his skull before training. Pankration combined punches, wrestling holds, and kicks with almost no restrictions: only eye-gouging and biting were banned. This type of athlete statue, often copied from a lost Greek bronze original, decorated Roman gymnasiums, where physical training remained inseparable from an aesthetic and moral ideal inherited from Greece.","es":"Este joven parece estar atándose una tira de cuero alrededor de la cabeza, un gesto propio de un practicante de pancracio o boxeo, protegiéndose el cráneo antes del entrenamiento. El pancracio combinaba golpes, llaves de lucha y patadas, con casi ninguna restricción: solo estaban prohibidos los mordiscos y meter los dedos en los ojos. Este tipo de estatua de atleta, a menudo copiada de un original griego en bronce hoy perdido, decoraba los gimnasios romanos, donde el ejercicio físico seguía siendo inseparable de un ideal estético y moral heredado de Grecia."}},{"id":"boy-with-dogs","meta":{"fr":{"t":"Jeune garçon et chiens","m":"2e s. · Cirque de Maxence, Via Appia"},"en":{"t":"Boy with Dogs","m":"2nd c. · Circus of Maxentius, Via Appia"},"es":{"t":"Niño con perros","m":"s. II · Circo de Majencio, Vía Apia"}},"txt":{"fr":"Découverte en 1828, cette statue d'un garçon nu n'a longtemps conservé que la tête, le torse et le haut des cuisses — les chiens à ses pieds semblaient une invention plus tardive. Des recherches récentes ont changé la donne : elles ont confirmé que les parties anciennes conservées correspondent exactement à un dessin réalisé au 19e siècle par l'archéologue Antonio Nibby, peu après la découverte. Ce croquis, retrouvé dans les archives, a permis d'authentifier la sculpture d'origine avec une précision inattendue — l'archéologie du 21e siècle validant un carnet vieux de deux cents ans.","en":"Discovered in 1828, this statue of a naked boy long survived only as a head, torso, and upper thighs — the dogs at his feet looked like a later addition. Recent research changed that: it confirmed that the surviving ancient portions match, detail for detail, a sketch made in the 19th century by the archaeologist Antonio Nibby, shortly after the discovery. That drawing, rediscovered in the archives, allowed scholars to authenticate the original sculpture with unexpected precision — 21st-century archaeology confirming a two-hundred-year-old notebook.","es":"Descubierta en 1828, esta estatua de un niño desnudo conservó durante mucho tiempo solo la cabeza, el torso y la parte superior de los muslos; los perros a sus pies parecían un añadido posterior. Investigaciones recientes cambiaron esa lectura: confirmaron que las partes antiguas conservadas coinciden, con precisión, con un dibujo realizado en el siglo XIX por el arqueólogo Antonio Nibby, poco después del hallazgo. Ese boceto, recuperado en los archivos, permitió autenticar la escultura original con una exactitud inesperada: la arqueología del siglo XXI confirmando un cuaderno de doscientos años."}},{"id":"maiden-of-vulci","meta":{"fr":{"t":"La jeune fille de Vulci","m":"Milieu du 1er s. av. n. è. · Peut-être trouvée à Vulci"},"en":{"t":"The Maiden of Vulci","m":"Mid-1st c. BCE · Possibly found in Vulci"},"es":{"t":"La joven de Vulci","m":"Mediados del s. I a.e.c. · Posiblemente hallada en Vulci"}},"txt":{"fr":"C'est, dit-on, l'œuvre la plus célèbre de toute la collection Torlonia : à peine trente-quatre centimètres de haut, et pourtant un visage qu'on n'oublie pas, le regard légèrement levé vers la droite. Une famille aisée et endeuillée a commandé ce portrait pour immortaliser une jeune femme, avec des détails autrefois saisissants de réalisme : une parure de cheveux ornée de bijoux, de vraies boucles d'oreilles rapportées, un drapé si fin qu'il semblait presque transparent. Qui était-elle ? On l'ignore. Mais ce visage anonyme est devenu, plus de deux mille ans plus tard, l'emblème visuel de toute l'exposition.","en":"This is said to be the single most famous work in the entire Torlonia Collection: barely thirteen inches tall, yet a face no one forgets, her gaze tilted slightly up and to the right. A wealthy, grieving family commissioned this portrait to immortalize a young woman, once finished with startlingly lifelike details — a jeweled hair ornament, real inset earrings, drapery carved so fine it looked almost transparent. Who was she? We don't know. But this anonymous face has become, over two thousand years later, the visual emblem of the entire exhibition.","es":"Se dice que es la obra más célebre de toda la colección Torlonia: apenas treinta y cuatro centímetros de alto, y sin embargo un rostro que no se olvida, con la mirada ligeramente alzada hacia la derecha. Una familia acomodada y de luto encargó este retrato para inmortalizar a una joven, con detalles antaño sorprendentemente realistas: un adorno de pelo con joyas, pendientes reales incrustados, un drapeado tan fino que parecía casi transparente. ¿Quién era? No lo sabemos. Pero este rostro anónimo se ha convertido, más de dos mil años después, en el emblema visual de toda la exposición."}},{"id":"euthydemus-bactria","meta":{"fr":{"t":"Portrait d'homme, dit Euthydème de Bactriane","m":"Fin 3e-début 2e s. av. n. è. · Collection Giustiniani"},"en":{"t":"Portrait of a Man, Known as Euthydemus of Bactria","m":"Late 3rd–early 2nd c. BCE · Giustiniani Collection"},"es":{"t":"Retrato de un hombre, llamado Eutidemo de Bactriana","m":"Fines s. III-inicios s. II a.e.c. · Colección Giustiniani"}},"txt":{"fr":"Un visage buriné, un regard sévère : ce portrait appartient à la tradition hellénistique du réalisme, celle-là même qui influencera plus tard les portraitistes romains. Le nom traditionnellement associé à cette tête, Euthydème, désignait un roi grec qui régnait sur la lointaine Bactriane, aux confins de l'Asie centrale, à des milliers de kilomètres de Rome — preuve de l'étendue du monde connu des collectionneurs antiques. Le large chapeau qui semblait autrefois l'identifier a en grande partie été ajouté des siècles après la sculpture originale, un rappel que les attributs d'un portrait peuvent parfois en dire plus sur ses restaurateurs que sur son sujet.","en":"A weathered face, a stern gaze: this portrait belongs to the Hellenistic tradition of realism that would later shape Roman portraiture. The name traditionally attached to this head, Euthydemus, refers to a Greek king who ruled distant Bactria, on the edges of Central Asia, thousands of kilometres from Rome — a reminder of just how wide the ancient collectors' known world really was. The broad hat that once seemed to identify him was largely added centuries after the original sculpture, a reminder that a portrait's attributes can sometimes say more about its restorers than about its subject.","es":"Un rostro curtido, una mirada severa: este retrato pertenece a la tradición helenística del realismo, la misma que más tarde influiría en los retratistas romanos. El nombre tradicionalmente asociado a esta cabeza, Eutidemo, designaba a un rey griego que gobernaba la lejana Bactriana, en los confines de Asia Central, a miles de kilómetros de Roma: prueba de lo extenso que era el mundo conocido para los coleccionistas antiguos. El amplio sombrero que antes parecía identificarlo fue en gran parte añadido siglos después de la escultura original, un recordator
